<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Sruti — Atlas of Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Inter, system-ui, sans-serif;
    background: #0b1020;
    color: white;
  }

  :root{
    --line: rgba(255,255,255,.08);
    --blue: #6aa9ff;
  }

  body{
    background:
      radial-gradient(circle at 78% 14%, rgba(220,230,255,.18) 0, rgba(220,230,255,.05) 14%, transparent 28%),
      radial-gradient(circle at 18% 20%, rgba(120,140,255,.10) 0, transparent 22%),
      linear-gradient(180deg, #091127 0%, #101a36 48%, #15203d 100%);
  }

  /* very light sky */
  #sky{
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(circle at 84% 16%, rgba(255,255,255,.14) 0 52px, rgba(200,215,255,.04) 53px, transparent 105px),
      radial-gradient(circle at 10% 22%, rgba(255,255,255,.12) 0 1px, transparent 2px),
      radial-gradient(circle at 18% 36%, rgba(255,255,255,.10) 0 1px, transparent 2px),
      radial-gradient(circle at 28% 14%, rgba(255,255,255,.13) 0 1px, transparent 2px),
      radial-gradient(circle at 36% 22%, rgba(255,255,255,.11) 0 1px, transparent 2px),
      radial-gradient(circle at 46% 12%, rgba(255,255,255,.10) 0 1px, transparent 2px),
      radial-gradient(circle at 58% 20%, rgba(255,255,255,.12) 0 1px, transparent 2px),
      radial-gradient(circle at 68% 10%, rgba(255,255,255,.10) 0 1px, transparent 2px),
      radial-gradient(circle at 88% 30%, rgba(255,255,255,.10) 0 1px, transparent 2px),
      linear-gradient(180deg, rgba(255,255,255,.03), transparent 40%);
  }

  #loading {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #0b1020;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
  }

  #loading .title {
    font-family: "Cormorant Garamond", serif;
    font-size: 24px;
    color: rgba(255,255,255,.82);
  }

  #loading .bar {
    width: 170px;
    height: 2px;
    background: rgba(255,255,255,.08);
    overflow: hidden;
    position: relative;
  }

  #loading .bar::after {
    content: "";
    position: absolute;
    inset: 0;
    width: 40%;
    background: linear-gradient(90deg, transparent, #78c89b, transparent);
    animation: loadMove 1s linear infinite;
  }

  @keyframes loadMove {
    0% { transform: translateX(-140%); }
    100% { transform: translateX(280%); }
  }

  #brand {
    position: fixed;
    top: 22px;
    left: 24px;
    z-index: 20;
    pointer-events: none;
  }

  #brand h1 {
    font-family: "Cormorant Garamond", serif;
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,.9);
  }

  #brand p {
    margin-top: 4px;
    font-size: 10px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(255,255,255,.34);
  }

  #controls {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 25;
    display: flex;
    gap: 8px;
  }

  .ctl {
    border: 1px solid var(--line);
    background: rgba(10,14,24,.62);
    color: rgba(255,255,255,.84);
    border-radius: 999px;
    padding: 9px 12px;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .ctl:hover {
    background: rgba(255,255,255,.10);
  }

  #viewport {
    position: fixed;
    inset: 0;
    overflow: hidden;
    touch-action: none;
    z-index: 5;
    cursor: grab;
  }

  #viewport.dragging { cursor: grabbing; }

  #world {
    position: absolute;
    width: 3800px;
    height: 2400px;
    left: 0;
    top: 0;
    transform-origin: 0 0;
    will-change: transform;
  }

  .route {
    position: absolute;
    height: 2px;
    transform-origin: left center;
    background: rgba(180,210,255,.18);
    border-radius: 999px;
    opacity: .7;
  }

  .island {
    position: absolute;
    width: 250px;
    height: 206px;
    transform: translate(-50%, -50%);
    cursor: pointer;
    user-select: none;
  }

  .island-inner {
    position: absolute;
    inset: 0;
    transition: transform .22s ease, filter .22s ease;
  }

  .island:hover .island-inner {
    transform: translateY(-2px);
  }

  .island.selected .island-inner {
    transform: scale(1.04);
    filter: drop-shadow(0 16px 26px rgba(100,160,255,.18));
  }

  .top {
    position: absolute;
    left: 50%;
    top: 28px;
    width: 162px;
    height: 98px;
    transform: translateX(-50%);
    background: var(--top, #9bdcb3);
    clip-path: polygon(10% 24%, 25% 10%, 67% 6%, 88% 20%, 94% 48%, 81% 76%, 40% 91%, 13% 77%, 5% 48%);
    border: 2px solid rgba(255,255,255,.08);
    box-shadow: inset 0 2px 0 rgba(255,255,255,.08);
  }

  .rim {
    position: absolute;
    left: 50%;
    top: 99px;
    width: 176px;
    height: 14px;
    transform: translateX(-50%);
    background: var(--rim, #4fd78a);
    clip-path: polygon(6% 24%, 23% 2%, 68% 0%, 91% 18%, 96% 54%, 79% 100%, 34% 100%, 10% 82%, 4% 52%);
    opacity: .96;
  }

  .bottom {
    position: absolute;
    left: 50%;
    top: 106px;
    width: 112px;
    height: 86px;
    transform: translateX(-50%);
    background: linear-gradient(180deg, #36404f 0%, #232b38 100%);
    clip-path: polygon(26% 0, 77% 0, 100% 19%, 84% 55%, 63% 100%, 40% 92%, 17% 58%, 0 18%);
  }

  .tree {
    position: absolute;
    width: 14px;
    height: 32px;
    opacity:.78;
  }

  .tree::before {
    content: "";
    position: absolute;
    left: 5px;
    bottom: 0;
    width: 4px;
    height: 11px;
    background: #6a4726;
    border-radius: 3px;
  }

  .tree::after {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 14px;
    height: 21px;
    background: #2cb75f;
    clip-path: polygon(50% 0, 100% 44%, 76% 44%, 100% 100%, 0 100%, 24% 44%, 0 44%);
  }

  .stone {
    position: absolute;
    width: 8px;
    height: 7px;
    background: #b4c2d0;
    border-radius: 4px;
    opacity: .48;
  }

  .landmark {
    position: absolute;
  }

  .landmark.spire {
    width: 8px;
    height: 42px;
    left: 50%;
    top: 49px;
    transform: translateX(-50%);
  }

  .landmark.spire::before {
    content: "";
    position: absolute;
    left: 3px;
    bottom: 0;
    width: 2px;
    height: 30px;
    background: rgba(236,242,250,.88);
  }

  .landmark.spire::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 0;
    width: 11px;
    height: 11px;
    transform: translateX(-50%);
    border-radius: 999px;
    background: rgba(225,236,255,.95);
  }

  .landmark.arch {
    left: 50%;
    top: 68px;
    width: 28px;
    height: 22px;
    transform: translateX(-50%);
    border: 3px solid rgba(238,244,248,.72);
    border-bottom: none;
    border-radius: 18px 18px 0 0;
  }

  .landmark.pavilion {
    left: 50%;
    top: 62px;
    width: 28px;
    height: 18px;
    transform: translateX(-50%);
    background: rgba(240,244,250,.72);
    clip-path: polygon(50% 0, 100% 34%, 86% 34%, 86% 100%, 14% 100%, 14% 34%, 0 34%);
  }

  .city-label {
    position: absolute;
    left: 50%;
    top: 4px;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
  }

  .city-name {
    font-family: "Cormorant Garamond", serif;
    font-size: 26px;
    font-weight: 500;
    color: rgba(255,255,255,.95);
    text-shadow: 0 2px 14px rgba(0,0,0,.16);
    white-space: nowrap;
  }

  .year-row {
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    width: 220px;
  }

  .year-chip {
    border: 1px solid rgba(255,255,255,.08);
    background: rgba(10,14,24,.58);
    color: rgba(255,255,255,.78);
    border-radius: 999px;
    padding: 5px 8px;
    font-size: 8.5px;
    letter-spacing: .12em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .island.selected .year-chip {
    background: rgba(90,173,255,.16);
    color: var(--blue);
    border-color: rgba(90,173,255,.34);
  }

  #strip {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 30;
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 22px 16px 18px;
    background: linear-gradient(180deg, transparent 0%, rgba(8,10,18,.72) 45%, rgba(8,10,18,.90) 100%);
    overflow-x: auto;
    scrollbar-width: none;
  }

  #strip::-webkit-scrollbar { display: none; }

  .yb {
    border: none;
    background: transparent;
    color: rgba(255,255,255,.34);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    padding: 0 2px;
    font-family: inherit;
    flex: 0 0 auto;
  }

  .yb.active { transform: translateY(-6px); }

  .yb .gem {
    width: 9px;
    height: 9px;
    border-radius: 2px;
    transform: rotate(45deg);
    background: rgba(125,205,155,.88);
  }

  .yb.active .gem {
    background: var(--blue);
  }

  .yb .label {
    font-size: 9.5px;
    letter-spacing: .08em;
  }

  .yb.active .label { color: var(--blue); }

  #nav {
    position: fixed;
    inset: 0;
    z-index: 26;
    pointer-events: none;
  }

  .navBtn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: auto;
    width: 42px;
    height: 42px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.05);
    color: rgba(255,255,255,.78);
    cursor: pointer;
    font-size: 16px;
    display: grid;
    place-items: center;
    opacity: 0;
  }

  .navBtn.show { opacity: 1; }
  .navBtn:disabled { opacity: .18; pointer-events: none; }

  #prevBtn { left: 16px; }
  #nextBtn { right: 16px; }

  /* Panel */
  #panel {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: min(520px, 96vw);
    z-index: 40;
    background: #f4f6f8;
    color: #132642;
    border-left: 1px solid rgba(20,40,70,.08);
    transform: translateX(105%);
    transition: transform .28s ease;
    display: flex;
    flex-direction: column;
  }

  #panel.open { transform: translateX(0%); }

  #closePanel {
    position: absolute;
    left: -42px;
    top: 16px;
    width: 32px;
    height: 32px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.10);
    background: rgba(8,10,18,.92);
    color: rgba(255,255,255,.75);
    cursor: pointer;
  }

  #panelHead {
    padding: 28px 28px 16px;
    background: #f4f6f8;
  }

  #panelPlace {
    font-family: "Cormorant Garamond", serif;
    font-size: 42px;
    font-weight: 500;
    line-height: .95;
    color: #102744;
  }

  #panelWhen {
    margin-top: 10px;
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #6d7f97;
  }

  #panelBody {
    overflow: auto;
    padding: 0 28px 34px;
    background: #f4f6f8;
  }

  .sec {
    margin-bottom: 28px;
  }

  .secLabel {
    font-family: "Cormorant Garamond", serif;
    font-size: 28px;
    font-weight: 500;
    color: #102744;
    padding-bottom: 10px;
    border-bottom: 1px solid #d8e0e8;
    margin-bottom: 18px;
  }

  .yearCards {
    display: grid;
    gap: 22px;
  }

  .yearCard {
    background: #fff;
    border: 1px solid #e9edf1;
    border-radius: 18px;
    box-shadow: 0 2px 10px rgba(20,40,70,.05);
    padding: 22px 24px;
  }

  .event {
    display: flex;
    gap: 18px;
    align-items: center;
  }

  .eventLogo {
    width: 64px;
    height: 64px;
    flex: 0 0 64px;
    border-radius: 999px;
    background: linear-gradient(180deg, #eef2f5 0%, #e6ebef 100%);
    border: 1px solid #e1e7ec;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #8ea0b4;
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    font-weight: 600;
    text-align: center;
    padding: 4px;
  }

  .eventMeta {
    min-width: 0;
    flex: 1;
  }

  .eventTitle {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.25;
    color: #0f203a;
  }

  .eventOrg {
    margin-top: 5px;
    font-size: 14px;
    line-height: 1.45;
    color: #0073d6;
  }

  .eventYearLine {
    margin-top: 2px;
    font-size: 13px;
    line-height: 1.4;
    color: #7b8ca3;
  }

  .eventNote {
    margin-top: 7px;
    font-size: 14px;
    line-height: 1.55;
    color: #5b6e87;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .tag {
    border: 1px solid #dbe3ea;
    background: #f7f9fb;
    color: #7387a0;
    border-radius: 999px;
    padding: 4px 8px;
    font-size: 10px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  @media (max-width: 780px) {
    #hint { display: none; }

    #controls {
      top: auto;
      bottom: 86px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 88vw;
    }

    #panel {
      width: 100%;
      top: auto;
      height: 70dvh;
      border-left: none;
      border-top: 1px solid rgba(20,40,70,.08);
      transform: translateY(105%);
      right: 0;
      bottom: 0;
    }

    #panel.open { transform: translateY(0%); }

    #closePanel {
      left: 50%;
      top: -40px;
      transform: translateX(-50%);
    }

    #panelPlace { font-size: 36px; }

    .event {
      align-items: flex-start;
    }

    .eventLogo {
      width: 56px;
      height: 56px;
      flex-basis: 56px;
    }
  }
</style>
</head>
<body>

<div id="loading">

</div>

<div id="sky"></div>

<div id="brand">
  <h1>Sruti Bhattacharjee</h1>
  <p>Atlas of Learning</p>
</div>

<div id="hint">
  Drag to move<br>
  Scroll / pinch to zoom<br>
  Click city or year
</div>

<div id="controls">
  <button class="ctl" id="fitBtn">Fit view</button>

</div>

<div id="viewport">

</div>

<div id="nav">
  <button id="prevBtn" class="navBtn">&#8592;</button>
  <button id="nextBtn" class="navBtn">&#8594;</button>
</div>

<div id="strip"></div>

<aside id="panel">
  <button id="closePanel">✕</button>
  <div id="panelHead">
    <div id="panelPlace">—</div>
    <div id="panelWhen">—</div>
  </div>
  <div id="panelBody"></div>
</aside>

      { title: "Summer Trainee", org: "University of Jyväskylä, Finland", year: "2025", note: "Accessible Interactive Technology, Multimodal Accessibility Design", tags:["Accessibility","Multimodal","Interactive Tech"], logoText:"JYU" }
    ]
  },
  {
    city: "Paris",
    years: ["2025","2026"],
    tagline: "Language, reflection & future direction",
    landmark: "arch",
    depth: 2,
    theme: { top: "#E8B6C6", rim: "#D48CA5" },
    experiences: [
      { title: "French Language Learning", org: "Paris, France", year: "2025", note: "Language learning and broader cultural fluency", tags:["French","Language","Growth"], logoText:"FR" },
      { title: "Family Building Chapter", org: "Paris, France", year: "2026", note: "A slower, intentional chapter centered on life direction and family building", tags:["Reflection","Family","Future"], logoText:"PAR" }
    ]
  }
];

const YEAR_TO_PLACE = {
  "2015":"Kanpur",
  "2016":"Chennai",
  "2017":"Kanpur",
  "2018":"Kharagpur",
  "2019":"Kolkata",
  "2020":"Kharagpur",
  "2021":"Lausanne",
  "2022":"Stockholm",
  "2023":"Lausanne",
  "2024":"Stockholm",
  "2025":"Jyväskylä",
  "2026":"Paris"
};

const TIMELINE_YEARS = ["2015","2016","2017","2018","2019","2020","2021","2022","2023","2024","2025","2026"];

const WORLD_W = 3800;
const WORLD_H = 2400;

const world = document.getElementById('world');
const viewport = document.getElementById('viewport');
const strip = document.getElementById('strip');

let selectedPlaceIndex = -1;

const state = {
  scale: 0.58,
  targetScale: 0.58,
  x: 0,
  y: 0,
  targetX: 0,
  targetY: 0,
  minScale: 0.36,
  maxScale: 1.5
};

function placePos(i){
  const preset = [
    {x: 520,  y: 930},   // Kanpur
    {x: 510,  y: 1480},  // Chennai
    {x: 860,  y: 1180},  // Kharagpur
    {x: 1170, y: 760},   // Chicago
    {x: 1190, y: 1740},  // Kolkata -> connector to middle
    {x: 1710, y: 1220},  // Lyon swapped

    {x: 2450, y: 1240},  // Stockholm middle
    {x: 2820, y: 760},   // Lausanne upper claw
    {x: 2810, y: 1710},  // Jyväskylä lower claw
    {x: 3360, y: 1240}   // Paris right endpoint
  ];
  return preset[i];
}

const islandEls = [];
const timelineButtons = [];

function createRoute(a, b){
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const len = Math.hypot(dx, dy);
  const ang = Math.atan2(dy, dx) * 180 / Math.PI;

  const route = document.createElement('div');
  route.className = 'route';
  route.style.left = `${a.x}px`;
  route.style.top = `${a.y}px`;
  route.style.width = `${len}px`;
  route.style.transform = `rotate(${ang}deg)`;
  world.appendChild(route);
}

function createIsland(place, i){
  const pos = placePos(i);
  const palette = place.theme;
  const yearsHTML = place.years.map(y => `<span class="year-chip">${y}</span>`).join('');

  const island = document.createElement('div');
  island.className = 'island';
  island.dataset.depth = String(place.depth || 2);
  island.style.left = `${pos.x}px`;
  island.style.top = `${pos.y}px`;

  island.innerHTML = `
    <div class="island-inner">
      <div class="city-label">
        <div class="city-name">${place.city}</div>
      </div>

      <div class="top" style="--top:${palette.top}"></div>
      <div class="rim" style="--rim:${palette.rim}"></div>
      <div class="bottom"></div>
      <div class="landmark ${place.landmark}"></div>

      <div class="tree" style="left:82px;top:72px;"></div>
      <div class="tree" style="left:118px;top:58px;transform:scale(1.02);"></div>
      <div class="stone" style="left:100px;top:100px;"></div>
      <div class="stone" style="left:110px;top:104px;"></div>
      <div class="stone" style="left:138px;top:92px;"></div>

      <div class="year-row">${yearsHTML}</div>
    </div>
  `;

  island.addEventListener('click', (e) => {
    e.stopPropagation();
    selectPlace(place.city);
  });

  world.appendChild(island);
  islandEls.push({ city: place.city, el: island, x: pos.x, y: pos.y, data: place });
}

PLACES.forEach(createIsland);
for(let i = 0; i < islandEls.length - 1; i++) createRoute(islandEls[i], islandEls[i + 1]);

TIMELINE_YEARS.forEach(year => {
  const btn = document.createElement('button');
  btn.className = 'yb';
  btn.innerHTML = `<span class="gem"></span><span class="label">${year}</span>`;
  btn.addEventListener('click', () => selectYear(year));
  strip.appendChild(btn);
  timelineButtons.push({year, el: btn});
});

function setPanel(place){
  document.getElementById('panelPlace').textContent = place.city;
  document.getElementById('panelWhen').textContent = place.tagline;

  document.getElementById('panelBody').innerHTML = `
    <section class="sec">
      <div class="secLabel">Selected Experiences</div>
      <div class="yearCards">
        ${place.experiences.map(exp => `
          <article class="yearCard">
            <div class="event">
              <div class="eventLogo">${exp.logoText || "Logo"}</div>
              <div class="eventMeta">
                <div class="eventTitle">${exp.title}</div>
                <div class="eventOrg">${exp.org}</div>
                <div class="eventYearLine">${exp.year}</div>
                <div class="eventNote">${exp.note}</div>
                <div class="tags">${(exp.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
              </div>
            </div>
          </article>
        `).join('')}
      </div>
    </section>
  `;
  document.getElementById('panel').classList.add('open');
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
}

function updateNav(){
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  const show = selectedPlaceIndex >= 0;
  prev.classList.toggle('show', show);
  next.classList.toggle('show', show);
  prev.disabled = selectedPlaceIndex <= 0;
  next.disabled = selectedPlaceIndex < 0 || selectedPlaceIndex >= islandEls.length - 1;
}

function focusOnPoint(worldX, worldY, zoom = 0.92){
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  state.targetScale = Math.max(state.minScale, Math.min(state.maxScale, zoom));
  state.targetX = vw * 0.5 - worldX * state.targetScale;
  state.targetY = vh * 0.5 - worldY * state.targetScale;
}

function fitAll(){
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const s = Math.min(vw / WORLD_W, vh / WORLD_H) * 0.84;
  state.targetScale = Math.max(state.minScale, Math.min(state.maxScale, s));
  state.targetX = (vw - WORLD_W * state.targetScale) * 0.5;
  state.targetY = (vh - WORLD_H * state.targetScale) * 0.5;
}

function resetView(){
  if(selectedPlaceIndex >= 0){
    const item = islandEls[selectedPlaceIndex];
    focusOnPoint(item.x, item.y, 0.92);
  } else {
    fitAll();
  }
}

function highlightTimelineYear(year){
  timelineButtons.forEach(item => item.el.classList.toggle('active', item.year === year));
}

function selectPlace(city){
  const idx = islandEls.findIndex(item => item.city === city);
  if(idx < 0) return;
  selectedPlaceIndex = idx;
  const item = islandEls[idx];

  islandEls.forEach((island, i) => island.el.classList.toggle('selected', i === idx));
  setPanel(item.data);
  updateNav();
  focusOnPoint(item.x, item.y, 0.92);
  highlightTimelineYear(item.data.years[item.data.years.length - 1]);
}

function selectYear(year){
  const city = YEAR_TO_PLACE[year];
  if(!city) return;
  highlightTimelineYear(year);
  selectPlace(city);
}

function deselect(){
  selectedPlaceIndex = -1;
  islandEls.forEach(item => item.el.classList.remove('selected'));
  timelineButtons.forEach(item => item.el.classList.remove('active'));
  closePanel();
  updateNav();
  fitAll();
}

document.getElementById('closePanel').addEventListener('click', deselect);
document.getElementById('fitBtn').addEventListener('click', fitAll);
document.getElementById('resetBtn').addEventListener('click', resetView);

document.getElementById('prevBtn').addEventListener('click', () => {
  if(selectedPlaceIndex > 0) selectPlace(islandEls[selectedPlaceIndex - 1].city);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if(selectedPlaceIndex >= 0 && selectedPlaceIndex < islandEls.length - 1) {
    selectPlace(islandEls[selectedPlaceIndex + 1].city);
  }
});

viewport.addEventListener('click', (e) => {
  if(e.target === viewport) deselect();
});

let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let startTargetX = 0;
let startTargetY = 0;

viewport.addEventListener('pointerdown', (e) => {
  isDragging = true;
  viewport.classList.add('dragging');
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  startTargetX = state.targetX;
  startTargetY = state.targetY;
});

window.addEventListener('pointermove', (e) => {
  if(!isDragging) return;
  state.targetX = startTargetX + (e.clientX - dragStartX);
  state.targetY = startTargetY + (e.clientY - dragStartY);
});

window.addEventListener('pointerup', () => {
  isDragging = false;
  viewport.classList.remove('dragging');
});

viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;

  const worldX = (px - state.targetX) / state.targetScale;
  const worldY = (py - state.targetY) / state.targetScale;

  const factor = e.deltaY > 0 ? 0.92 : 1.08;
  let newScale = state.targetScale * factor;
  newScale = Math.max(state.minScale, Math.min(state.maxScale, newScale));

  state.targetX = px - worldX * newScale;
  state.targetY = py - worldY * newScale;
  state.targetScale = newScale;
}, { passive: false });

let pinchStartDist = 0;
let pinchStartScale = 1;
let pinchWorldCenter = null;

viewport.addEventListener('touchstart', (e) => {
  if(e.touches.length === 2){
    const a = e.touches[0];
    const b = e.touches[1];
    pinchStartDist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    pinchStartScale = state.targetScale;

    const rect = viewport.getBoundingClientRect();
    const cx = (a.clientX + b.clientX) * 0.5 - rect.left;
    const cy = (a.clientY + b.clientY) * 0.5 - rect.top;

    pinchWorldCenter = {
      wx: (cx - state.targetX) / state.targetScale,
      wy: (cy - state.targetY) / state.targetScale
    };
  }
}, { passive: false });

viewport.addEventListener('touchmove', (e) => {
  if(e.touches.length === 2 && pinchWorldCenter){
    e.preventDefault();
    const a = e.touches[0];
    const b = e.touches[1];
    const dist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);

    let newScale = pinchStartScale * (dist / pinchStartDist);
    newScale = Math.max(state.minScale, Math.min(state.maxScale, newScale));

    const rect = viewport.getBoundingClientRect();
    const cx = (a.clientX + b.clientX) * 0.5 - rect.left;
    const cy = (a.clientY + b.clientY) * 0.5 - rect.top;

    state.targetScale = newScale;
    state.targetX = cx - pinchWorldCenter.wx * newScale;
    state.targetY = cy - pinchWorldCenter.wy * newScale;
  }
}, { passive: false });

viewport.addEventListener('touchend', () => {
  pinchWorldCenter = null;
});

function animate(){
  state.scale += (state.targetScale - state.scale) * 0.14;
  state.x += (state.targetX - state.x) * 0.14;
  state.y += (state.targetY - state.y) * 0.14;
  world.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
  requestAnimationFrame(animate);
}

window.addEventListener('resize', fitAll);

requestAnimationFrame(() => {
  fitAll();
  selectPlace('Stockholm');
  animate();
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
  }, 180);
});
</script>
</body>
</html>
