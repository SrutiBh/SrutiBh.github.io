<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="Sruti Bhattacharjee — Interactive Journey"/>
<title>Sruti — Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
/* ── Reset & Base ─────────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold:   #c8a84b;
  --blue:   #4a9eff;
  --teal:   #2dd4a4;
  --purple: #a78bfa;
  --green:  #4ade80;
  --pink:   #f472b6;
  --bg:     #06070f;
  --panel:  rgba(6,7,15,0.97);
  --border: rgba(255,255,255,0.07);
  --text:   rgba(255,255,255,0.85);
  --muted:  rgba(255,255,255,0.30);
  --r: 14px;
}
html, body {
  width:100%; height:100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ── Layout ────────────────────────────────────────────────────── */
#app {
  display: grid;
  grid-template-columns: 1fr 360px;
  grid-template-rows: 100vh;
  overflow: hidden;
}
@media (max-width: 768px) {
  #app {
    grid-template-columns: 1fr;
    grid-template-rows: 52vh 1fr;
    height: 100dvh;
  }
}

/* ── Globe side ─────────────────────────────────────────────────── */
#globe-wrap {
  position: relative;
  overflow: hidden;
}
#globe-wrap canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}

/* Vignette */
#globe-wrap::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 60% at 50% 50%,
    transparent 40%, rgba(6,7,15,0.7) 100%);
  pointer-events: none;
}

/* Year orbit labels */
#orbit {
  position: absolute; inset: 0;
  pointer-events: none;
}
.yr {
  position: absolute;
  transform: translate(-50%, -50%);
  pointer-events: all;
  cursor: pointer;
  user-select: none;
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid transparent;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.09em;
  color: var(--muted);
  transition: color .25s, border-color .25s, background .25s;
  white-space: nowrap;
  will-change: transform, opacity;
}
.yr:hover  { color: rgba(255,255,255,0.9); }
.yr.active {
  color: var(--gold);
  border-color: rgba(200,168,75,0.45);
  background: rgba(200,168,75,0.07);
}
.yr-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  flex-shrink: 0;
  transition: background .25s, box-shadow .25s;
}
.yr.has-ev .yr-dot  { background: rgba(255,255,255,0.5); }
.yr.active .yr-dot  { background: var(--gold); box-shadow: 0 0 7px var(--gold); }

/* Corner label */
#globe-label {
  position: absolute; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); pointer-events: none; z-index: 5;
  opacity: 0.7;
}

/* Drag hint fade */
#drag-hint {
  position: absolute; bottom: 36px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase;
  color: rgba(255,255,255,0.15); pointer-events: none; z-index: 5;
}

/* ── Panel side ─────────────────────────────────────────────────── */
#panel {
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 32px 26px 24px;
  overflow: hidden;
  position: relative;
}
@media (max-width: 768px) {
  #panel {
    border-left: none;
    border-top: 1px solid var(--border);
    padding: 18px 18px 16px;
  }
}

/* Panel header */
#panel-yr {
  font-family: 'Cormorant Garamond', serif;
  font-size: 64px; font-weight: 300;
  line-height: 1; letter-spacing: -0.02em;
  color: rgba(255,255,255,0.06);
  transition: color .5s;
  flex-shrink: 0;
}
#panel-yr.lit { color: rgba(200,168,75,0.65); }
@media (max-width: 768px) { #panel-yr { font-size: 42px; } }

#panel-sub {
  font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase;
  color: var(--muted); margin: 4px 0 22px; flex-shrink: 0;
}
@media (max-width: 768px) { #panel-sub { margin-bottom: 14px; } }

/* Cards scroll area */
#cards {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex; flex-direction: column; gap: 14px;
  padding-right: 6px;
  /* custom thin scrollbar */
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
#cards::-webkit-scrollbar { width: 3px; }
#cards::-webkit-scrollbar-track { background: transparent; }
#cards::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* Empty state */
.empty {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 15px;
  color: rgba(255,255,255,0.12);
  padding-top: 8px;
}

/* Event card */
.card {
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 15px 17px;
  background: rgba(255,255,255,0.02);
  opacity: 0;
  transform: translateY(10px);
  transition: border-color .2s, background .2s;
  will-change: opacity, transform;
}
.card:hover {
  border-color: rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.04);
}
.card.milestone { border-color: rgba(200,168,75,0.2); }
.card.current   { border-color: rgba(74,222,128,0.25); background: rgba(74,222,128,0.03); }
.card.personal  { border-color: rgba(244,114,182,0.18); }

.c-type {
  font-size: 8px; letter-spacing: 0.13em; text-transform: uppercase;
  font-weight: 500; margin-bottom: 7px;
}
.c-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 400;
  color: rgba(255,255,255,0.9);
  line-height: 1.32; margin-bottom: 5px;
}
.c-org  { font-size: 11px; color: rgba(120,170,255,0.75); margin-bottom: 6px; }
.c-note { font-size: 10.5px; color: rgba(255,255,255,0.33); line-height: 1.6; }
.c-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.c-tag  {
  font-size: 8px; letter-spacing: 0.07em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 20px;
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.28);
  border: 1px solid rgba(255,255,255,0.08);
}

/* Progress bar along top of panel */
#progress {
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: rgba(255,255,255,0.04);
  flex-shrink: 0; overflow: hidden;
}
#progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), rgba(200,168,75,0.3));
  width: 0%; transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

/* WebXR button (only shown if supported) */
#xr-btn {
  position: absolute; top: 16px; right: 16px; z-index: 20;
  padding: 6px 14px; border-radius: 20px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.6);
  font-size: 10px; font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; display: none;
  transition: background .2s, color .2s;
}
#xr-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .card, .yr, #panel-yr { transition: none !important; }
}
</style>
</head>
<body>
<div id="app">

  <!-- LEFT: Globe -->
  <div id="globe-wrap">
    <div id="orbit" aria-hidden="true"></div>
    <div id="drag-hint">Drag to spin · click a year</div>
    <button id="xr-btn" aria-label="View in AR">AR View</button>
  </div>

  <!-- RIGHT: Panel -->
  <section id="panel" aria-label="Journey details">
    <div id="progress"><div id="progress-fill"></div></div>
    <div id="panel-yr" aria-live="polite">—</div>
    <div id="panel-sub">Select a year</div>
    <div id="cards" role="list">
      <p class="empty">Click any year on the globe to explore your journey.</p>
    </div>
  </section>
</div>

<!-- Three.js r148 (lightweight, no extras needed) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.148.0/build/three.min.js"></script>
<!-- GSAP 3 -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>

<script>
'use strict';
// ── DATA ─────────────────────────────────────────────────────────────────────
const EVENTS = {
  1994:[{title:'Born in India',org:'West Bengal, India',note:'The beginning of everything.',type:'milestone',tags:['india']}],
  2014:[{title:'Started BTech in Information Technology',org:'WBUT, India',note:'First step into tech — later the only student in a batch of 60 to study NLP, Robotics, and Computer Vision.',type:'education',tags:['india','education']}],
  2015:[{title:'First Research Internship',org:'IIT Kanpur, India',note:'Music script generation from Harmonium video · Matlab, Python, PyTorch · perspective transformation.',type:'research',tags:['india','research']}],
  2016:[{title:'Summer Internship',org:'IIT Madras, India',note:"Music listener's emotional reaction analysis · Matlab · audio-emotion signal processing.",type:'research',tags:['india','research']}],
  2017:[
    {title:'Visiting Studentship + BTech Thesis',org:'IIT Kharagpur, India',note:'Counterfeit IC Detection using Computer Vision · Masked RCNN, TensorFlow · image processing pipeline.',type:'milestone',tags:['india','research']},
    {title:'Cloth Simulation Research',org:'IIT Kanpur, India',note:'OpenGL 4 · rigid-body and cloth collision using Bullet Physics · tessellation and 3D design thinking.',type:'research',tags:['india','research']},
  ],
  2018:[
    {title:'BTech Thesis Defence',org:'IIT Kharagpur, India',note:'Successfully defended thesis on Counterfeit IC Detection using Computer Vision.',type:'education',tags:['india','education']},
    {title:'Remote Internships',org:'Université Claude Bernard Lyon 1 · UIUC',note:'Infant vocal emotion detection using Pyramidal LSTM · XNMT, PyTorch, Dynet · symmetry literature review.',type:'research',tags:['remote','research']},
  ],
  2019:[
    {title:'Visiting Lecturer',org:'NSHM Knowledge Campus, Kolkata',note:'Taught 3D Computer Graphics using OpenGL and C++ to undergraduate students.',type:'education',tags:['india','education']},
    {title:'Research Assistantship',org:'IIT Kanpur, India',note:'Tessellation · 3D high-dimensional design thinking · cloth and rigid-body simulation.',type:'research',tags:['india','research']},
    {title:'Remote Internship',org:'IIT Kharagpur, India',note:'Computer vision research project · Python, PyTorch.',type:'research',tags:['india','research']},
  ],
  2020:[
    {title:'Started MSc — Interactive Media Technology',org:'KTH Royal Institute of Technology, Sweden',note:'HCI, Multimodal Perception · Teaching Assistant (Visualization, Python, Networking, ML for Media Tech) · GPA 4.4/5',type:'milestone',tags:['sweden','education']},
    {title:'Research Engineer',org:'IIT Kharagpur, India (Remote)',note:'DeepFake Face Video Detection · interframe difference for wrinkle movement detection · Python, PyTorch.',type:'research',tags:['india','research']},
  ],
  2021:[
    {title:'Summer R&D Intern — Haptic Teleoperation',org:'Ericsson Research, Sweden',note:'Changes in haptic stiffness perception based on network latency/jitter in teleoperation systems · ROS, Python, Figma.',type:'milestone',tags:['sweden','research']},
    {title:'Graduate Exchange + Research Assistant',org:'EPFL, Switzerland',note:'Digital Humanities · Design Research · Computer Vision · ML in VR · facial expression recognition with LightGBM and Random Forest · GPA 4.6/6',type:'education',tags:['switzerland','education','research']},
  ],
  2022:[
    {title:'Research Assistant — EdTech',org:'University of Lausanne (UNIL), Switzerland',note:'Education Technology to support programming learning in hybrid university classes · Participatory Design workshops · interviews.',type:'research',tags:['switzerland','research','design']},
    {title:'Teaching Assistant',org:'KTH Royal Institute of Technology',note:'Courses: Visualization · Computer Networking · Python · Multimodal Technology Design · Multivariable Calculus.',type:'education',tags:['sweden','education']},
  ],
  2023:[
    {title:'VRLE UX Research',org:'EPFL, Switzerland',note:'Virtual Reality Learning Environments user research · laying groundwork for MSc thesis.',type:'research',tags:['switzerland','research','design']},
    {title:'Venice Time Machine',org:'EPFL, Switzerland',note:'3D model of Venice for preserving building height data based on Google Earth data.',type:'research',tags:['switzerland','research']},
  ],
  2024:[
    {title:'Self Care & Independent Research',org:'Paris, France',note:'Focused recovery, introspection, and independent deep reading in HCI, AI policy, and neurorights.',type:'personal',tags:['personal']},
  ],
  2025:[
    {title:'Summer Trainee',org:'University of Jyväskylä, Finland',note:'Accessible Interactive Technology · Multimodal Accessibility Design · haptic-audio graph navigation for blind STEM students.',type:'research',tags:['finland','research','design']},
  ],
  2026:[
    {title:'MSc Thesis — Re-Designing VRLE for Effective Pedagogy',org:'KTH Royal Institute of Technology + EPFL',note:'Studying how VR-based learning environments can provide genuine pedagogical support. ACM SIGCHI paper in progress.',type:'current',tags:['sweden','switzerland','design','research']},
  ],
};

const YEARS = [1994,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025,2026];
const YEAR_MIN = YEARS[0], YEAR_MAX = YEARS[YEARS.length-1];

const TYPE_META = {
  milestone: { label:'★  Milestone',     color:'#c8a84b' },
  education:  { label:'Education',        color:'#4a9eff' },
  research:   { label:'Research',         color:'#2dd4a4' },
  design:     { label:'HCI / Design',     color:'#a78bfa' },
  current:    { label:'⬤  Current',       color:'#4ade80' },
  personal:   { label:'Personal',         color:'#f472b6' },
};

// ── CAPABILITY DETECTION ─────────────────────────────────────────────────────
const prefersReduced = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
const isLowEnd = navigator.hardwareConcurrency <= 2 || (navigator.deviceMemory && navigator.deviceMemory <= 2);
const isMobile = /Mobi|Android/i.test(navigator.userAgent);
const PIXEL_RATIO = Math.min(window.devicePixelRatio || 1, isLowEnd ? 1 : isMobile ? 1.5 : 2);
const PARTICLE_COUNT = isLowEnd ? 0 : isMobile ? 40 : 90;
const GLOBE_SEGMENTS = isLowEnd ? 20 : isMobile ? 28 : 40;

// ── THREE.JS SCENE ───────────────────────────────────────────────────────────
const wrap = document.getElementById('globe-wrap');
const renderer = new THREE.WebGLRenderer({ antialias: !isLowEnd, alpha: true, powerPreference: 'low-power' });
renderer.setPixelRatio(PIXEL_RATIO);
renderer.setClearColor(0x000000, 0);
wrap.insertBefore(renderer.domElement, wrap.firstChild);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.z = 280;

// Resize
function resizeRenderer() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  positionOrbit();
}
window.addEventListener('resize', resizeRenderer);

// ── GLOBE (custom GLSL wireframe) ────────────────────────────────────────────
const GLOBE_R = 72;

// Custom shader material for globe — glowing edges
const globeMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:    { value: 0 },
    uColor:   { value: new THREE.Color(0.3, 0.55, 1.0) },
    uAlpha:   { value: 0.14 },
  },
  vertexShader: `
    varying vec3 vPos;
    void main() {
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec3  uColor;
    uniform float uAlpha;
    varying vec3  vPos;
    void main() {
      // Pulse glow on equator band
      float eq = 1.0 - abs(vPos.y / ${GLOBE_R.toFixed(1)});
      float pulse = 0.5 + 0.5 * sin(uTime * 0.8 + vPos.x * 0.05);
      float a = uAlpha + eq * 0.06 * pulse;
      gl_FragColor = vec4(uColor, a);
    }
  `,
  transparent: true,
  depthWrite: false,
});

// Build wireframe globe manually
const globeGroup = new THREE.Group();
scene.add(globeGroup);

// Latitude rings
for (let lat = -80; lat <= 80; lat += 18) {
  const phi = THREE.MathUtils.degToRad(lat);
  const r = GLOBE_R * Math.cos(phi);
  const y = GLOBE_R * Math.sin(phi);
  const pts = [];
  for (let i = 0; i <= GLOBE_SEGMENTS; i++) {
    const th = (i / GLOBE_SEGMENTS) * Math.PI * 2;
    pts.push(new THREE.Vector3(r * Math.cos(th), y, r * Math.sin(th)));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  globeGroup.add(new THREE.Line(geo, globeMat));
}
// Longitude meridians
for (let lon = 0; lon < 360; lon += 18) {
  const th = THREE.MathUtils.degToRad(lon);
  const pts = [];
  for (let i = 0; i <= GLOBE_SEGMENTS; i++) {
    const phi = ((i / GLOBE_SEGMENTS) - 0.5) * Math.PI;
    pts.push(new THREE.Vector3(
      GLOBE_R * Math.cos(phi) * Math.cos(th),
      GLOBE_R * Math.sin(phi),
      GLOBE_R * Math.cos(phi) * Math.sin(th)
    ));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  globeGroup.add(new THREE.Line(geo, globeMat));
}

// ── YEAR NODES ON GLOBE SURFACE ──────────────────────────────────────────────
const nodeMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    attribute float aSize;
    attribute vec3  aColor;
    attribute float aAlpha;
    attribute float aSelected;
    varying vec3  vColor;
    varying float vAlpha;
    varying float vSel;
    uniform float uTime;
    void main() {
      vColor = aColor;
      vAlpha = aAlpha;
      vSel   = aSelected;
      float pulse = aSelected > 0.5 ? 1.0 + 0.25 * sin(uTime * 3.0) : 1.0;
      gl_PointSize = aSize * pulse;
      gl_Position  = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3  vColor;
    varying float vAlpha;
    varying float vSel;
    void main() {
      vec2  uv = gl_PointCoord - 0.5;
      float d  = length(uv) * 2.0;
      if (d > 1.0) discard;
      float core  = 1.0 - smoothstep(0.4, 0.9, d);
      float ring  = smoothstep(0.65, 0.72, d) * (1.0 - smoothstep(0.84, 0.95, d));
      float glow  = vSel * (1.0 - d) * 0.5;
      float alpha = (core + ring * 0.7 + glow) * vAlpha;
      gl_FragColor = vec4(vColor * (core + glow) + vec3(1.0) * ring * 0.6, alpha);
    }
  `,
  transparent: true,
  depthWrite:  false,
  blending:    THREE.AdditiveBlending,
});

// Build point cloud for year nodes
const yearPositions = new Float32Array(YEARS.length * 3);
const yearSizes     = new Float32Array(YEARS.length);
const yearColors    = new Float32Array(YEARS.length * 3);
const yearAlphas    = new Float32Array(YEARS.length);
const yearSelected  = new Float32Array(YEARS.length);

// 3D positions stored for orbit label placement
const yearWorld = {}; // year → THREE.Vector3

YEARS.forEach((y, i) => {
  const frac = i / (YEARS.length - 1);
  const lon  = frac * Math.PI * 2;
  const lat  = Math.sin(i * 1.2) * 0.28;
  const pos  = new THREE.Vector3(
    GLOBE_R * Math.cos(lat) * Math.cos(lon),
    GLOBE_R * Math.sin(lat),
    GLOBE_R * Math.cos(lat) * Math.sin(lon)
  );
  yearWorld[y] = pos;
  yearPositions[i*3]   = pos.x;
  yearPositions[i*3+1] = pos.y;
  yearPositions[i*3+2] = pos.z;
  yearSizes[i]     = (EVENTS[y]||[]).length > 0 ? 9 : 5;
  yearColors[i*3]  = 0.7; yearColors[i*3+1] = 0.75; yearColors[i*3+2] = 1.0;
  yearAlphas[i]    = (EVENTS[y]||[]).length ? 0.7 : 0.35;
  yearSelected[i]  = 0;
});

const nodeGeo = new THREE.BufferGeometry();
nodeGeo.setAttribute('position',  new THREE.BufferAttribute(yearPositions, 3));
nodeGeo.setAttribute('aSize',     new THREE.BufferAttribute(yearSizes, 1));
nodeGeo.setAttribute('aColor',    new THREE.BufferAttribute(yearColors, 3));
nodeGeo.setAttribute('aAlpha',    new THREE.BufferAttribute(yearAlphas, 1));
nodeGeo.setAttribute('aSelected', new THREE.BufferAttribute(yearSelected, 1));
const nodeMesh = new THREE.Points(nodeGeo, nodeMat);
globeGroup.add(nodeMesh);

// ── PARTICLES ────────────────────────────────────────────────────────────────
let particleMesh = null;
if (PARTICLE_COUNT > 0) {
  const ptGeo = new THREE.BufferGeometry();
  const pPos  = new Float32Array(PARTICLE_COUNT * 3);
  const pSize = new Float32Array(PARTICLE_COUNT);
  const pAlpha= new Float32Array(PARTICLE_COUNT);
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const phi = Math.acos(2 * Math.random() - 1);
    const th  = Math.random() * Math.PI * 2;
    const r   = GLOBE_R * (1.15 + Math.random() * 0.85);
    pPos[i*3]   = r * Math.sin(phi) * Math.cos(th);
    pPos[i*3+1] = r * Math.cos(phi);
    pPos[i*3+2] = r * Math.sin(phi) * Math.sin(th);
    pSize[i]  = Math.random() * 1.8 + 0.4;
    pAlpha[i] = Math.random() * 0.18 + 0.04;
  }
  const ptMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute float aSize;
      attribute float aAlpha;
      varying float vAlpha;
      void main() {
        vAlpha = aAlpha;
        gl_PointSize = aSize;
        gl_Position  = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        if (d > 1.0) discard;
        gl_FragColor = vec4(1.0, 1.0, 1.0, (1.0 - d) * vAlpha);
      }
    `,
    transparent: true,
    depthWrite:  false,
    blending:    THREE.AdditiveBlending,
  });
  ptGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  ptGeo.setAttribute('aSize',    new THREE.BufferAttribute(pSize, 1));
  ptGeo.setAttribute('aAlpha',   new THREE.BufferAttribute(pAlpha, 1));
  particleMesh = new THREE.Points(ptGeo, ptMat);
  scene.add(particleMesh);
}

// ── ORBIT LABELS (DOM) ───────────────────────────────────────────────────────
const orbitEl  = document.getElementById('orbit');
const yearBtns = {};
const tempV    = new THREE.Vector3();

YEARS.forEach(y => {
  const el = document.createElement('div');
  el.className = 'yr' + ((EVENTS[y]||[]).length ? ' has-ev' : '');
  el.setAttribute('role', 'button');
  el.setAttribute('aria-label', `Year ${y}`);
  el.setAttribute('tabindex', '0');
  el.innerHTML = `<span class="yr-dot"></span>${y}`;
  el.addEventListener('click',  () => selectYear(y));
  el.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') selectYear(y); });
  orbitEl.appendChild(el);
  yearBtns[y] = el;
});

function positionOrbit() {
  const W = wrap.clientWidth, H = wrap.clientHeight;
  YEARS.forEach(y => {
    const worldPos = yearWorld[y].clone();
    // Apply globe group rotation to world pos
    worldPos.applyEuler(globeGroup.rotation);
    tempV.copy(worldPos);
    tempV.project(camera);
    const sx = ( tempV.x * 0.5 + 0.5) * W;
    const sy = (-tempV.y * 0.5 + 0.5) * H;
    const depth = (tempV.z + 1) / 2; // 0=far, 1=near
    const scale = 0.65 + depth * 0.45;
    const el    = yearBtns[y];
    el.style.left    = sx + 'px';
    el.style.top     = sy + 'px';
    el.style.transform = `translate(-50%,-50%) scale(${scale})`;
    el.style.zIndex    = Math.round(depth * 20);
    const base = y === selectedYear ? 1 :
                 (EVENTS[y]||[]).length ? 0.25 + depth * 0.6 : 0.1 + depth * 0.3;
    el.style.opacity = String(Math.min(1, base));
  });
}

// ── INTERACTION ───────────────────────────────────────────────────────────────
let selectedYear = null;
let isDragging   = false;
let lastX = 0, lastY = 0;
let targetRotY   = 0;
let autoSpin     = !prefersReduced;
let autoSpinTimer = null;

function resumeAutoSpin() {
  clearTimeout(autoSpinTimer);
  autoSpinTimer = setTimeout(() => { autoSpin = true; }, 4000);
}

// Drag
renderer.domElement.addEventListener('pointerdown', e => {
  isDragging = true; lastX = e.clientX; lastY = e.clientY;
  autoSpin   = false;
  renderer.domElement.setPointerCapture(e.pointerId);
});
renderer.domElement.addEventListener('pointermove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  gsap.to(globeGroup.rotation, {
    y: globeGroup.rotation.y + dx * 0.007,
    x: THREE.MathUtils.clamp(globeGroup.rotation.x + dy * 0.004, -0.8, 0.8),
    duration: 0.1, overwrite: true,
  });
});
renderer.domElement.addEventListener('pointerup',   () => { isDragging = false; resumeAutoSpin(); });
renderer.domElement.addEventListener('pointerleave', () => { isDragging = false; });

// Pinch zoom
let lastPinch = 0;
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 2)
    lastPinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                           e.touches[0].clientY - e.touches[1].clientY);
}, { passive: true });
renderer.domElement.addEventListener('touchmove', e => {
  if (e.touches.length !== 2) return;
  const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                       e.touches[0].clientY - e.touches[1].clientY);
  if (lastPinch) camera.position.z = THREE.MathUtils.clamp(camera.position.z * (lastPinch / d), 150, 500);
  lastPinch = d;
}, { passive: true });

// Scroll zoom
renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  camera.position.z = THREE.MathUtils.clamp(camera.position.z + e.deltaY * 0.3, 150, 500);
}, { passive: false });

// ── SELECT YEAR ───────────────────────────────────────────────────────────────
function selectYear(y) {
  selectedYear = y;
  autoSpin = false;
  resumeAutoSpin();

  // Update orbit button states
  YEARS.forEach((yr, i) => {
    yearBtns[yr].classList.toggle('active', yr === y);
    // Update shader selected flag
    yearSelected[i] = yr === y ? 1 : 0;
    yearColors[i*3]   = yr === y ? 0.78 : 0.7;
    yearColors[i*3+1] = yr === y ? 0.66 : 0.75;
    yearColors[i*3+2] = yr === y ? 0.29 : 1.0;
  });
  nodeGeo.attributes.aSelected.needsUpdate = true;
  nodeGeo.attributes.aColor.needsUpdate    = true;

  // Rotate globe so selected year faces camera
  const worldPos = yearWorld[y];
  const targetY  = -Math.atan2(worldPos.x, worldPos.z);
  gsap.to(globeGroup.rotation, {
    y: targetY, duration: 1.1,
    ease: 'power3.inOut',
    overwrite: true,
  });

  // Progress bar
  const frac = (YEARS.indexOf(y)) / (YEARS.length - 1);
  gsap.to('#progress-fill', { width: (frac * 100) + '%', duration: 0.5, ease: 'power2.out' });

  // Panel year
  const panelYr = document.getElementById('panel-yr');
  gsap.to(panelYr, { opacity: 0, y: -6, duration: 0.18, onComplete: () => {
    panelYr.textContent = y;
    panelYr.classList.add('lit');
    document.getElementById('panel-sub').textContent =
      y === 2026 ? 'Current — Ongoing' : `${(EVENTS[y]||[]).length} event${(EVENTS[y]||[]).length===1?'':'s'}`;
    gsap.to(panelYr, { opacity: 1, y: 0, duration: 0.28, ease: 'power2.out' });
  }});

  // Cards
  const list = document.getElementById('cards');
  // Fade out existing
  gsap.to(list.querySelectorAll('.card'), {
    opacity: 0, y: -8, duration: 0.18, stagger: 0.04,
    onComplete: () => {
      list.innerHTML = '';
      const evs = EVENTS[y] || [];
      if (!evs.length) {
        list.innerHTML = '<p class="empty">No recorded events for this year.</p>';
        return;
      }
      evs.forEach((ev, i) => {
        const card = document.createElement('article');
        card.className = `card ${ev.type}`;
        card.setAttribute('role', 'listitem');
        const meta = TYPE_META[ev.type] || { label: ev.type, color: '#fff' };
        card.innerHTML = `
          <div class="c-type" style="color:${meta.color}">${meta.label}</div>
          <div class="c-title">${ev.title}</div>
          ${ev.org ? `<div class="c-org">${ev.org}</div>` : ''}
          ${ev.note ? `<div class="c-note">${ev.note}</div>` : ''}
          <div class="c-tags">${ev.tags.map(t=>`<span class="c-tag">${t}</span>`).join('')}</div>
        `;
        list.appendChild(card);
        // GSAP stagger in
        gsap.fromTo(card,
          { opacity: 0, y: 14 },
          { opacity: 1, y: 0, duration: 0.38, delay: i * 0.08, ease: 'power2.out' }
        );
      });
    }
  });

  // Drag hint fade
  gsap.to('#drag-hint', { opacity: 0, duration: 0.4 });
}

// ── WEBXR (graceful — only show if supported) ────────────────────────────────
if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-ar').then(supported => {
    if (!supported) return;
    const btn = document.getElementById('xr-btn');
    btn.style.display = 'block';
    let xrSession = null;
    btn.addEventListener('click', async () => {
      if (xrSession) { await xrSession.end(); return; }
      try {
        xrSession = await navigator.xr.requestSession('immersive-ar',
          { requiredFeatures: ['local'], optionalFeatures: ['dom-overlay'],
            domOverlay: { root: document.getElementById('app') } });
        renderer.xr.enabled = true;
        renderer.xr.setSession(xrSession);
        btn.textContent = 'Exit AR';
        xrSession.addEventListener('end', () => {
          xrSession = null; renderer.xr.enabled = false; btn.textContent = 'AR View';
        });
      } catch(e) { console.warn('XR not available:', e); }
    });
  });
}

// ── ANIMATION LOOP ────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let frameCount = 0;

function animate() {
  renderer.setAnimationLoop(animate);
  const t = clock.getElapsedTime();
  frameCount++;

  // Auto-spin (slow, pauses when user interacts)
  if (autoSpin && !isDragging && !prefersReduced) {
    globeGroup.rotation.y += 0.0025;
  }

  // Particle slow orbit
  if (particleMesh) {
    particleMesh.rotation.y = t * 0.04;
    particleMesh.rotation.x = Math.sin(t * 0.02) * 0.1;
  }

  // Update shader uniforms
  globeMat.uniforms.uTime.value   = t;
  nodeMat.uniforms.uTime.value    = t;

  // Update orbit label positions (every 2 frames on mobile, every frame on desktop)
  if (!isMobile || frameCount % 2 === 0) positionOrbit();

  renderer.render(scene, camera);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
resizeRenderer();
animate();

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!selectedYear) return;
  const idx = YEARS.indexOf(selectedYear);
  if (e.key === 'ArrowRight' && idx < YEARS.length - 1) selectYear(YEARS[idx + 1]);
  if (e.key === 'ArrowLeft'  && idx > 0)                selectYear(YEARS[idx - 1]);
});

// Default: select 2026 after a short delay
setTimeout(() => selectYear(2026), 600);

// Fade in drag hint
gsap.from('#drag-hint', { opacity: 0, duration: 1, delay: 1.2 });
</script>
</body>
