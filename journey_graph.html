<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Sruti — Atlas of Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Inter, system-ui, sans-serif;
    color: #fff;
    background: #0b1020;
  }

  :root{
    --green:#4fd78a;
    --blue:#7bb8ff;
    --blue-strong:#5aadff;
    --line:rgba(255,255,255,.08);
    --panel:rgba(10,13,23,.88);

    --sky-top: #0c1430;
    --sky-mid: #141d3b;
    --sky-bottom: #232845;

    --glow-left: rgba(100,130,255,.08);
    --glow-right: rgba(205,225,255,.22);

    --moon-opacity: .98;
    --sun-opacity: .0;
    --stars-opacity: .62;

    --cloud-back-opacity: .22;
    --cloud-front-opacity: .28;

    --mist-opacity: .18;
  }

  #loading {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #090c16;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #loading .title {
    font-family: "Cormorant Garamond", serif;
    font-size: 24px;
    color: rgba(255,255,255,.78);
  }
  #loading .bar {
    width: 180px;
    height: 2px;
    background: rgba(255,255,255,.08);
    overflow: hidden;
    position: relative;
  }
  #loading .bar::after {
    content: "";
    position: absolute;
    inset: 0;
    width: 42%;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    animation: loadMove 1.1s linear infinite;
  }
  @keyframes loadMove {
    0% { transform: translateX(-140%); }
    100% { transform: translateX(280%); }
  }

  #sky{
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .sky-gradient,
  .sky-glow,
  .sky-sun,
  .sky-moon,
  .sky-stars,
  .sky-clouds,
  .sky-mist {
    transition:
      background 2.8s ease,
      opacity 2.8s ease,
      transform 2.8s ease,
      filter 2.8s ease;
  }

  .sky-gradient{
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 20% 18%, color-mix(in srgb, var(--glow-left) 48%, transparent), transparent 26%),
      radial-gradient(circle at 80% 22%, color-mix(in srgb, var(--glow-right) 52%, transparent), transparent 28%),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 48%, var(--sky-bottom) 100%);
  }

  .sky-glow{
    position:absolute;
    width:46vw;
    height:46vw;
    border-radius:50%;
    filter: blur(70px);
    opacity:.55;
  }
  .sky-glow-left{
    left:-8vw;
    top:2vh;
    background: radial-gradient(circle, var(--glow-left), transparent 70%);
  }
  .sky-glow-right{
    right:-10vw;
    top:8vh;
    background: radial-gradient(circle, var(--glow-right), transparent 70%);
  }

  .sky-sun{
    position:absolute;
    left:10vw;
    top:10vh;
    width:120px;
    height:120px;
    border-radius:50%;
    background:
      radial-gradient(circle, rgba(255,242,188,.96) 0%, rgba(255,220,130,.82) 46%, rgba(255,190,100,.28) 72%, transparent 100%);
    opacity: var(--sun-opacity);
    filter: blur(1px);
    box-shadow: 0 0 60px rgba(255,210,120,.18);
  }

  .sky-moon{
    position:absolute;
    right:10vw;
    top:10vh;
    width:110px;
    height:110px;
    border-radius:50%;
    background:
      radial-gradient(circle at 35% 35%, rgba(255,255,255,.98), rgba(243,244,255,.92) 55%, rgba(220,228,255,.78) 78%, rgba(190,205,255,.22) 100%);
    box-shadow:
      0 0 36px rgba(255,255,255,.22),
      0 0 95px rgba(180,210,255,.14);
    opacity: var(--moon-opacity);
    filter: blur(.2px);
  }

  .sky-stars{
    position:absolute;
    inset:0;
    opacity: var(--stars-opacity);
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,255,255,.82) 0 1px, transparent 1.6px),
      radial-gradient(circle at 18% 42%, rgba(255,255,255,.62) 0 1px, transparent 1.6px),
      radial-gradient(circle at 28% 14%, rgba(255,255,255,.72) 0 1px, transparent 1.6px),
      radial-gradient(circle at 36% 32%, rgba(255,255,255,.55) 0 1px, transparent 1.6px),
      radial-gradient(circle at 47% 18%, rgba(255,255,255,.70) 0 1px, transparent 1.6px),
      radial-gradient(circle at 56% 10%, rgba(255,255,255,.64) 0 1px, transparent 1.6px),
      radial-gradient(circle at 63% 26%, rgba(255,255,255,.82) 0 1px, transparent 1.6px),
      radial-gradient(circle at 72% 16%, rgba(255,255,255,.60) 0 1px, transparent 1.6px),
      radial-gradient(circle at 82% 24%, rgba(255,255,255,.72) 0 1px, transparent 1.6px),
      radial-gradient(circle at 91% 14%, rgba(255,255,255,.55) 0 1px, transparent 1.6px),
      radial-gradient(circle at 12% 66%, rgba(255,255,255,.62) 0 1px, transparent 1.6px),
      radial-gradient(circle at 32% 74%, rgba(255,255,255,.74) 0 1px, transparent 1.6px),
      radial-gradient(circle at 54% 68%, rgba(255,255,255,.58) 0 1px, transparent 1.6px),
      radial-gradient(circle at 74% 62%, rgba(255,255,255,.68) 0 1px, transparent 1.6px),
      radial-gradient(circle at 88% 72%, rgba(255,255,255,.58) 0 1px, transparent 1.6px);
  }

  .sky-clouds{
    position:absolute;
    left:-10%;
    width:120%;
    border-radius:50%;
    filter: blur(34px);
  }
  .sky-clouds-back{
    bottom:-8%;
    height:35%;
    opacity: var(--cloud-back-opacity);
    background:
      radial-gradient(circle at 8% 40%, rgba(255,255,255,.18), transparent 18%),
      radial-gradient(circle at 24% 52%, rgba(255,255,255,.16), transparent 20%),
      radial-gradient(circle at 42% 42%, rgba(255,255,255,.16), transparent 18%),
      radial-gradient(circle at 58% 50%, rgba(255,255,255,.14), transparent 20%),
      radial-gradient(circle at 76% 44%, rgba(255,255,255,.18), transparent 18%),
      radial-gradient(circle at 92% 54%, rgba(255,255,255,.14), transparent 19%);
  }
  .sky-clouds-front{
    bottom:-16%;
    height:42%;
    opacity: var(--cloud-front-opacity);
    background:
      radial-gradient(circle at 14% 40%, rgba(255,245,240,.22), transparent 20%),
      radial-gradient(circle at 34% 52%, rgba(255,240,235,.20), transparent 22%),
      radial-gradient(circle at 56% 46%, rgba(255,245,240,.18), transparent 22%),
      radial-gradient(circle at 78% 50%, rgba(255,240,235,.22), transparent 22%);
  }

  .sky-mist{
    position:absolute;
    inset:auto 0 0 0;
    height:44%;
    opacity: var(--mist-opacity);
    background:
      linear-gradient(180deg, transparent 0%, rgba(255,255,255,.03) 35%, rgba(255,255,255,.10) 100%);
    filter: blur(20px);
  }

  @keyframes driftBack {
    0% { transform: translateX(0px) translateY(0px); }
    50% { transform: translateX(18px) translateY(-6px); }
    100% { transform: translateX(0px) translateY(0px); }
  }
  @keyframes driftFront {
    0% { transform: translateX(0px) translateY(0px); }
    50% { transform: translateX(-24px) translateY(8px); }
    100% { transform: translateX(0px) translateY(0px); }
  }
  @keyframes starPulse {
    0%, 100% { opacity: var(--stars-opacity); }
    50% { opacity: calc(var(--stars-opacity) + .04); }
  }
  .sky-clouds-back { animation: driftBack 28s ease-in-out infinite; }
  .sky-clouds-front { animation: driftFront 34s ease-in-out infinite; }
  .sky-stars { animation: starPulse 10s ease-in-out infinite; }

  #brand {
    position: fixed;
    top: 22px;
    left: 24px;
    z-index: 30;
    pointer-events: none;
  }
  #brand h1 {
    font-family: "Cormorant Garamond", serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: .03em;
    color: rgba(255,255,255,.84);
  }
  #brand p {
    margin-top: 4px;
    font-size: 10px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(255,255,255,.32);
  }

  #hint {
    position: fixed;
    top: 22px;
    right: 24px;
    z-index: 30;
    text-align: right;
    font-size: 10px;
    letter-spacing: .15em;
    text-transform: uppercase;
    line-height: 1.8;
    color: rgba(255,255,255,.28);
    pointer-events: none;
  }

  #controls {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 35;
    display: flex;
    gap: 8px;
  }
  .ctl {
    border: 1px solid var(--line);
    background: rgba(10,14,24,.66);
    color: rgba(255,255,255,.82);
    border-radius: 999px;
    padding: 9px 12px;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    cursor: pointer;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .ctl:hover {
    background: rgba(255,255,255,.10);
    color: white;
  }

  #viewport {
    position: fixed;
    inset: 0;
    overflow: hidden;
    cursor: grab;
    touch-action: none;
    z-index: 5;
  }
  #viewport.dragging { cursor: grabbing; }

  #world {
    position: absolute;
    width: 3400px;
    height: 2200px;
    left: 0;
    top: 0;
    transform-origin: 0 0;
    will-change: transform;
  }

  .route {
    position: absolute;
    height: 2px;
    transform-origin: left center;
    background: linear-gradient(90deg, rgba(123,184,255,.16), rgba(79,215,138,.14));
    border-radius: 999px;
    opacity: .45;
  }

  .route-dot {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: rgba(255,255,255,.16);
    box-shadow: 0 0 0 1px rgba(255,255,255,.04);
    transform: translate(-50%, -50%);
  }

  .island {
    position: absolute;
    width: 250px;
    height: 200px;
    transform: translate(-50%, -50%);
    cursor: pointer;
    user-select: none;
  }

  .island-inner {
    position: absolute;
    inset: 0;
    transition: transform .28s ease, filter .28s ease, opacity .28s ease;
  }

  .island:hover .island-inner {
    transform: translateY(-3px) scale(1.01);
  }

  .island.selected .island-inner {
    transform: scale(1.04);
    filter: drop-shadow(0 20px 44px rgba(90,173,255,.18));
  }

  .island.selected .island-inner::after{
    content:"";
    position:absolute;
    left:50%;
    top:60%;
    width:180px;
    height:180px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background: radial-gradient(circle, rgba(120,170,255,0.18), transparent 70%);
    filter: blur(20px);
    z-index:-1;
  }

  .island[data-depth="1"] .island-inner { opacity: .86; }
  .island[data-depth="2"] .island-inner { opacity: .93; }
  .island[data-depth="3"] .island-inner { opacity: 1; }

  .top {
    position: absolute;
    left: 50%;
    top: 24px;
    width: 160px;
    height: 96px;
    transform: translateX(-50%);
    background: var(--top, #9bdcb3);
    clip-path: polygon(10% 24%, 25% 10%, 67% 6%, 88% 20%, 94% 48%, 81% 76%, 40% 91%, 13% 77%, 5% 48%);
    border: 2px solid rgba(255,255,255,.09);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,.10),
      0 10px 20px rgba(0,0,0,.18);
    filter: saturate(.85) brightness(.95);
  }

  .rim {
    position: absolute;
    left: 50%;
    top: 95px;
    width: 174px;
    height: 14px;
    transform: translateX(-50%);
    background: var(--rim, #4fd78a);
    clip-path: polygon(6% 24%, 23% 2%, 68% 0%, 91% 18%, 96% 54%, 79% 100%, 34% 100%, 10% 82%, 4% 52%);
    opacity: .95;
    filter: saturate(.9);
  }

  .bottom {
    position: absolute;
    left: 50%;
    top: 101px;
    width: 110px;
    height: 84px;
    transform: translateX(-50%);
    background: linear-gradient(180deg, #36404f 0%, #232b38 100%);
    clip-path: polygon(26% 0, 77% 0, 100% 19%, 84% 55%, 63% 100%, 40% 92%, 17% 58%, 0 18%);
    filter: drop-shadow(0 16px 18px rgba(0,0,0,.24));
  }

  .tree {
    position: absolute;
    width: 18px;
    height: 40px;
    opacity:.9;
  }
  .tree::before {
    content: "";
    position: absolute;
    left: 7px;
    bottom: 0;
    width: 4px;
    height: 14px;
    background: #6a4726;
    border-radius: 3px;
  }
  .tree::after {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 18px;
    height: 26px;
    background: #2cb75f;
    clip-path: polygon(50% 0, 100% 44%, 76% 44%, 100% 100%, 0 100%, 24% 44%, 0 44%);
    border-radius: 3px;
  }

  .stone {
    position: absolute;
    width: 10px;
    height: 8px;
    background: #b4c2d0;
    border-radius: 4px;
    opacity: .7;
  }

  .landmark {
    position: absolute;
  }
  .landmark.spire {
    width: 8px;
    height: 42px;
    left: 50%;
    top: 45px;
    transform: translateX(-50%);
  }
  .landmark.spire::before {
    content: "";
    position: absolute;
    left: 3px;
    bottom: 0;
    width: 2px;
    height: 30px;
    background: rgba(236,242,250,.88);
  }
  .landmark.spire::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 0;
    width: 12px;
    height: 12px;
    transform: translateX(-50%);
    border-radius: 999px;
    background: var(--marker, #5aadff);
    box-shadow: 0 0 14px rgba(90,173,255,.22);
  }

  .landmark.arch {
    left: 50%;
    top: 64px;
    width: 28px;
    height: 22px;
    transform: translateX(-50%);
    border: 3px solid rgba(238,244,248,.75);
    border-bottom: none;
    border-radius: 18px 18px 0 0;
    opacity: .9;
  }

  .landmark.pavilion {
    left: 50%;
    top: 58px;
    width: 28px;
    height: 18px;
    transform: translateX(-50%);
    background: rgba(240,244,250,.78);
    clip-path: polygon(50% 0, 100% 34%, 86% 34%, 86% 100%, 14% 100%, 14% 34%, 0 34%);
    border-radius: 2px;
  }

  .city-label {
    position: absolute;
    left: 50%;
    top: -2px;
    transform: translateX(-50%);
    width: max-content;
    max-width: 230px;
    text-align: center;
    pointer-events: none;
  }
  .city-name {
    font-family: "Cormorant Garamond", serif;
    font-size: 25px;
    font-weight: 500;
    letter-spacing: .01em;
    color: rgba(255,255,255,.92);
    text-shadow: 0 2px 14px rgba(0,0,0,.16);
  }
  .city-learn {
    margin-top: 7px;
    border: 1px solid rgba(255,255,255,.08);
    background: rgba(10,14,24,.55);
    color: rgba(255,255,255,.78);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 9.5px;
    letter-spacing: .06em;
    white-space: nowrap;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  .year-row {
    position: absolute;
    left: 50%;
    bottom: 2px;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    width: 220px;
  }

  .year-chip {
    border: 1px solid rgba(255,255,255,.08);
    background: rgba(10,14,24,.60);
    color: rgba(255,255,255,.78);
    border-radius: 999px;
    padding: 5px 9px;
    font-size: 9px;
    letter-spacing: .12em;
    text-transform: uppercase;
    white-space: nowrap;
    transition: background .22s ease, color .22s ease, border-color .22s ease;
  }

  .island.selected .year-chip {
    background: rgba(90,173,255,.18);
    color: var(--blue-strong);
    border-color: rgba(90,173,255,.42);
  }

  #strip {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 40;
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 22px 16px 18px;
    background: linear-gradient(180deg, transparent 0%, rgba(8,10,18,.78) 45%, rgba(8,10,18,.92) 100%);
    overflow-x: auto;
    scrollbar-width: none;
  }
  #strip::-webkit-scrollbar { display: none; }

  .yb {
    border: none;
    background: transparent;
    color: rgba(255,255,255,.34);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    padding: 0 2px;
    transition: transform .18s ease;
    font-family: inherit;
    flex: 0 0 auto;
  }
  .yb:hover { transform: translateY(-3px); }
  .yb.active { transform: translateY(-7px); }
  .yb .gem {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    transform: rotate(45deg);
    background: var(--green);
    box-shadow: 0 0 12px rgba(79,215,138,.25);
  }
  .yb.active .gem {
    background: var(--blue-strong);
    box-shadow: 0 0 12px rgba(90,173,255,.45);
  }
  .yb .label {
    font-size: 10px;
    letter-spacing: .08em;
  }
  .yb.active .label { color: var(--blue-strong); }

  #nav {
    position: fixed;
    inset: 0;
    z-index: 38;
    pointer-events: none;
  }
  .navBtn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: auto;
    width: 42px;
    height: 42px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.05);
    color: rgba(255,255,255,.78);
    cursor: pointer;
    font-size: 16px;
    display: grid;
    place-items: center;
    opacity: 0;
    transition: opacity .2s ease, background .18s ease;
  }
  .navBtn.show { opacity: 1; }
  .navBtn:hover { background: rgba(255,255,255,.10); }
  .navBtn:disabled { opacity: .18; pointer-events: none; }
  #prevBtn { left: 16px; }
  #nextBtn { right: 16px; }

  #panel {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: min(390px, 92vw);
    z-index: 50;
    background: var(--panel);
    border-left: 1px solid var(--line);
    transform: translateX(105%);
    transition: transform .35s ease;
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    display: flex;
    flex-direction: column;
  }
  #panel.open { transform: translateX(0%); }

  #closePanel {
    position: absolute;
    left: -42px;
    top: 16px;
    width: 32px;
    height: 32px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(8,10,18,.92);
    color: rgba(255,255,255,.62);
    cursor: pointer;
  }

  #panelHead {
    padding: 28px 24px 18px;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  #panelPlace {
    font-family: "Cormorant Garamond", serif;
    font-size: 44px;
    font-weight: 500;
    line-height: .95;
    color: rgba(255,255,255,.92);
  }
  #panelWhen {
    margin-top: 6px;
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--blue-strong);
  }
  #panelWhere {
    display: none;
  }

  #panelBody {
    overflow: auto;
    padding: 18px 24px 28px;
  }
  .sec {
    margin-bottom: 22px;
  }
  .secLabel {
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: rgba(255,255,255,.28);
    margin-bottom: 10px;
  }
  .learnList {
    display: grid;
    gap: 10px;
  }
  .learnItem {
    border: 1px solid rgba(255,255,255,.08);
    background: rgba(255,255,255,.025);
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    color: rgba(255,255,255,.82);
  }

  .yearCards {
    display: grid;
    gap: 14px;
  }
  .yearCard {
    border: 1px solid rgba(255,255,255,.08);
    background: rgba(255,255,255,.025);
    border-radius: 14px;
    padding: 14px;
  }
  .yearHead {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
  }
  .yearValue {
    font-family: "Cormorant Garamond", serif;
    font-size: 28px;
    color: var(--blue-strong);
    line-height: 1;
  }
  .yearMini {
    font-size: 9px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(255,255,255,.30);
  }
  .event {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,.06);
  }
  .event:first-of-type {
    margin-top: 10px;
    padding-top: 0;
    border-top: none;
  }
  .eventTitle {
    font-family: "Cormorant Garamond", serif;
    font-size: 19px;
    color: rgba(255,255,255,.92);
    line-height: 1.2;
  }
  .eventOrg {
    margin-top: 4px;
    font-size: 12px;
    color: rgba(123,184,255,.82);
  }
  .eventNote {
    margin-top: 7px;
    font-size: 13px;
    line-height: 1.6;
    color: rgba(255,255,255,.44);
  }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .tag {
    border: 1px solid rgba(255,255,255,.08);

const YEAR_TO_PLACE = {
  "2015":"Kanpur",
  "2016":"Chennai",
  "2017":"Kanpur",
  "2018":"Kharagpur",
  "2019":"Kanpur",
  "2020":"Stockholm",
  "2021":"Lausanne",
  "2022":"Lausanne",
  "2023":"Lausanne",
  "2024":"Paris",
  "2026":"Stockholm"
};

const TIMELINE_YEARS = ["2015","2016","2017","2018","2019","2020","2021","2022","2023","2024","2026"];

const WORLD_W = 3400;
const WORLD_H = 2200;

const world = document.getElementById('world');
const viewport = document.getElementById('viewport');
const strip = document.getElementById('strip');

let selectedPlaceIndex = -1;
let selectedTimelineYear = null;

const state = {
  scale: 0.64,
  targetScale: 0.64,
  x: 0,
  y: 0,
  targetX: 0,
  targetY: 0,
  minScale: 0.38,
  maxScale: 1.7,
};

function placePos(i){
  const preset = [
    {x: 620,  y: 1200},
    {x: 880,  y: 1500},
    {x: 1080, y: 1080},
    {x: 1540, y: 860 },
    {x: 1820, y: 1180},
    {x: 2360, y: 820 },
    {x: 2570, y: 1140},
    {x: 2830, y: 1380}
  ];
  return preset[i];
}

const islandEls = [];
const timelineButtons = [];

function createRoute(a, b){
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const len = Math.hypot(dx, dy);
  const ang = Math.atan2(dy, dx) * 180 / Math.PI;

  const route = document.createElement('div');
  route.className = 'route';
  route.style.left = `${a.x}px`;
  route.style.top = `${a.y}px`;
  route.style.width = `${len}px`;
  route.style.transform = `rotate(${ang}deg)`;
  world.appendChild(route);

  const steps = Math.max(2, Math.floor(len / 220));
  for(let i=1;i<steps;i++){
    const t = i/steps;
    const dot = document.createElement('div');
    dot.className = 'route-dot';
    dot.style.left = `${a.x + dx*t}px`;
    dot.style.top = `${a.y + dy*t}px`;
    world.appendChild(dot);
  }
}

function createIsland(place, i){
  const pos = placePos(i);
  const palette = place.theme || { top: "#9bdcb3", rim: "#4fd78a" };
  const yearsHTML = place.years.map(y => `<span class="year-chip">${y}</span>`).join('');

  const island = document.createElement('div');
  island.className = 'island';
  island.dataset.depth = String(place.depth || 2);
  island.style.left = `${pos.x}px`;
  island.style.top = `${pos.y}px`;

  island.innerHTML = `
    <div class="island-inner">
      <div class="city-label">
        <div class="city-name">${place.city}</div>
        <div class="city-learn">${place.tagline}</div>
      </div>

      <div class="top" style="--top:${palette.top}"></div>
      <div class="rim" style="--rim:${palette.rim}"></div>
      <div class="bottom"></div>
      <div class="landmark ${place.landmark || 'spire'}" style="--marker:#5aadff"></div>

      <div class="tree" style="left:78px;top:68px;"></div>
      <div class="tree" style="left:118px;top:54px;transform:scale(1.04);"></div>
      <div class="stone" style="left:98px;top:96px;"></div>
      <div class="stone" style="left:110px;top:100px;"></div>
      <div class="stone" style="left:138px;top:88px;"></div>

      <div class="year-row">${yearsHTML}</div>
    </div>
  `;

  island.addEventListener('click', (e) => {
    e.stopPropagation();
    selectPlace(place.city);
  });

  world.appendChild(island);
  islandEls.push({ city: place.city, el: island, x: pos.x, y: pos.y, data: place });
}

PLACES.forEach(createIsland);
for(let i = 0; i < islandEls.length - 1; i++){
  createRoute(islandEls[i], islandEls[i + 1]);
}

function setPanel(place){
  document.getElementById('panelPlace').textContent = place.city;
  document.getElementById('panelWhen').textContent = `${place.years[0]} — ${place.years[place.years.length - 1]}`;

                  <div class="tags">${(ev.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
                </div>
              `).join('')}
            </article>
          `;
        }).join('')}
      </div>
    </section>
  `;

  document.getElementById('panel').classList.add('open');

function closePanel(){
  document.getElementById('panel').classList.remove('open');

function updateNav(){
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  const show = selectedPlaceIndex >= 0;
  prev.classList.toggle('show', show);
  next.classList.toggle('show', show);
  prev.disabled = selectedPlaceIndex <= 0;
  next.disabled = selectedPlaceIndex < 0 || selectedPlaceIndex >= islandEls.length - 1;
}

function focusOnPoint(worldX, worldY, zoom = 0.96){
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  state.targetScale = Math.max(state.minScale, Math.min(state.maxScale, zoom));
  state.targetX = vw * 0.5 - worldX * state.targetScale;
  state.targetY = vh * 0.5 - worldY * state.targetScale;
}

function fitAll(){
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const sx = vw / WORLD_W;
  const sy = vh / WORLD_H;
  const s = Math.min(sx, sy) * 0.88;

  state.targetScale = Math.max(state.minScale, Math.min(state.maxScale, s));
  state.targetX = (vw - WORLD_W * state.targetScale) * 0.5;
  state.targetY = (vh - WORLD_H * state.targetScale) * 0.5;
}

function resetView(){
  if(selectedPlaceIndex >= 0){
    const item = islandEls[selectedPlaceIndex];
    focusOnPoint(item.x, item.y, 0.96);
  } else {
    fitAll();
  }
}

function highlightTimelineYear(year){
  selectedTimelineYear = year;
  timelineButtons.forEach(item => item.el.classList.toggle('active', item.year === year));
}

function selectPlace(city){
  const idx = islandEls.findIndex(item => item.city === city);
  if(idx < 0) return;

  selectedPlaceIndex = idx;
  const item = islandEls[idx];

  islandEls.forEach((island, i) => {
    island.el.classList.toggle('selected', i === idx);
  });

  setPanel(item.data);
  updateNav();
  focusOnPoint(item.x, item.y, 0.96);

  const matchingYear = item.data.years[item.data.years.length - 1];
  highlightTimelineYear(matchingYear);
}

function selectYear(year){
  const city = YEAR_TO_PLACE[year];
  if(!city) return;
  highlightTimelineYear(year);
  selectPlace(city);
}

function deselect(){
  selectedPlaceIndex = -1;
  selectedTimelineYear = null;
  islandEls.forEach(item => item.el.classList.remove('selected'));
  timelineButtons.forEach(item => item.el.classList.remove('active'));
  closePanel();
  updateNav();
  fitAll();
}

document.getElementById('closePanel').addEventListener('click', deselect);
document.getElementById('fitBtn').addEventListener('click', fitAll);
document.getElementById('resetBtn').addEventListener('click', resetView);
document.getElementById('skyBtn').addEventListener('click', () => applySkyMood(currentSky + 1));

document.getElementById('prevBtn').addEventListener('click', () => {
  if(selectedPlaceIndex > 0) selectPlace(islandEls[selectedPlaceIndex - 1].city);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if(selectedPlaceIndex >= 0 && selectedPlaceIndex < islandEls.length - 1) {
    selectPlace(islandEls[selectedPlaceIndex + 1].city);
  }
});

viewport.addEventListener('click', (e) => {
  if(e.target === viewport) deselect();
});

let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let startTargetX = 0;
let startTargetY = 0;

viewport.addEventListener('pointerdown', (e) => {
  isDragging = true;
  viewport.classList.add('dragging');
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  startTargetX = state.targetX;
  startTargetY = state.targetY;
});

window.addEventListener('pointermove', (e) => {
  if(!isDragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  state.targetX = startTargetX + dx;
  state.targetY = startTargetY + dy;
});

window.addEventListener('pointerup', () => {
  isDragging = false;
  viewport.classList.remove('dragging');
});

viewport.addEventListener('wheel', (e) => {
  e.preventDefault();

  const rect = viewport.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;

  const worldX = (px - state.targetX) / state.targetScale;
  const worldY = (py - state.targetY) / state.targetScale;

  const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
  let newScale = state.targetScale * zoomFactor;
  newScale = Math.max(state.minScale, Math.min(state.maxScale, newScale));

  state.targetX = px - worldX * newScale;
  state.targetY = py - worldY * newScale;
  state.targetScale = newScale;
}, { passive: false });

let pinchStartDist = 0;
let pinchStartScale = 1;
let pinchWorldCenter = null;

viewport.addEventListener('touchstart', (e) => {
  if(e.touches.length === 2){
    const a = e.touches[0];
    const b = e.touches[1];
    pinchStartDist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    pinchStartScale = state.targetScale;

    const rect = viewport.getBoundingClientRect();
    const cx = (a.clientX + b.clientX) * 0.5 - rect.left;
    const cy = (a.clientY + b.clientY) * 0.5 - rect.top;

    pinchWorldCenter = {
      wx: (cx - state.targetX) / state.targetScale,
      wy: (cy - state.targetY) / state.targetScale
    };
  }
}, { passive: false });

viewport.addEventListener('touchmove', (e) => {
  if(e.touches.length === 2 && pinchWorldCenter){
    e.preventDefault();
    const a = e.touches[0];
    const b = e.touches[1];
    const dist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);

    let newScale = pinchStartScale * (dist / pinchStartDist);
    newScale = Math.max(state.minScale, Math.min(state.maxScale, newScale));

    const rect = viewport.getBoundingClientRect();
    const cx = (a.clientX + b.clientX) * 0.5 - rect.left;
    const cy = (a.clientY + b.clientY) * 0.5 - rect.top;

    state.targetScale = newScale;
    state.targetX = cx - pinchWorldCenter.wx * newScale;
    state.targetY = cy - pinchWorldCenter.wy * newScale;
  }
}, { passive: false });

viewport.addEventListener('touchend', () => {
  pinchWorldCenter = null;
});

function animate(){
  state.scale += (state.targetScale - state.scale) * 0.14;
  state.x += (state.targetX - state.x) * 0.14;
  state.y += (state.targetY - state.y) * 0.14;
  world.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
  requestAnimationFrame(animate);
}

window.addEventListener('resize', fitAll);

applySkyMood(currentSky);

setTimeout(() => {
  document.getElementById('loading').style.display = 'none';
  fitAll();
  selectPlace('Stockholm');
  animate();
}, 650);

setInterval(() => {
  applySkyMood(currentSky + 1);
}, 600000);
</script>
</body>
</html>
