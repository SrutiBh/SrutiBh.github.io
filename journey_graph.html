      letter-spacing: -0.01em;

    /* ════════════════════════════════════════
       JOURNEY MAP
    ════════════════════════════════════════ */
    .jshell {
      position: relative;
      background: linear-gradient(180deg,#0d1328 0%,#111936 46%,#15203d 100%);
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(15,23,42,0.14);
      transition: all 0.28s ease;
      overscroll-behavior: contain;
    }

    .jshell.is-maximized {
      position: fixed;
      inset: 1rem;
      z-index: 80;
      border-radius: 1rem;
      box-shadow: 0 24px 80px rgba(15,23,42,0.28);
    }

    .jtoolbar {
      position: absolute;
      top: 0.9rem;
      right: 1rem;
      z-index: 12;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .jicon-btn {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(10,16,32,0.26);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s, border-color 0.15s;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 0.9rem;
      line-height: 1;
    }
    .jicon-btn:hover {
      background: rgba(10,16,32,0.38);
      border-color: rgba(255,255,255,0.16);
      transform: translateY(-1px);
    }

    .jvp {
      position: relative;
      height: 620px;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: contain;
      cursor: grab;
      background:
        radial-gradient(circle at 88% 19%, #fffde8 0 58px, rgba(255,250,200,.18) 59px, transparent 130px),
        radial-gradient(circle at 10% 18%, rgba(255,255,255,.55) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 22% 32%, rgba(255,255,255,.45) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 38% 10%, rgba(255,255,255,.60) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 52% 22%, rgba(255,255,255,.45) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 67% 8%,  rgba(255,255,255,.50) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 30% 55%, rgba(255,255,255,.40) 0 1px, transparent 2px),
        radial-gradient(circle at 78% 28%, rgba(255,255,255,.45) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 90% 18%, rgba(255,255,255,.40) 0 1px, transparent 2px),
        radial-gradient(circle at 15% 70%, rgba(255,255,255,.35) 0 1px, transparent 2px),
        radial-gradient(circle at 60% 75%, rgba(255,255,255,.40) 0 1px, transparent 2px),
        linear-gradient(180deg, #06102a 0%, #0c1840 50%, #111e48 100%);
      transition: height 0.28s ease;
    }
    .jshell.is-maximized .jvp {
      height: calc(100vh - 1.2rem);
    }

    .jvp.dragging { cursor: grabbing; }

    .jworld {
      position: absolute; left: 0; top: 0;
      width: 3600px; height: 1800px;
      transform-origin: 0 0; will-change: transform;
    }

    /* ── ISLAND ── */
    .jisland {
      position: absolute;
      width: 380px;
      height: 370px;
      transform: translate(-50%, -50%);
      cursor: pointer;
      user-select: none;
    }
    .jinner { position: absolute; inset: 0; transition: transform 0.22s ease; }
    .jisland:hover .jinner { transform: translateY(-6px); }
    .jisland.sel .jinner { transform: scale(1.07); }

    /* ── CITY LABEL: clearly above the island ── */
    .jlabel {
      position: absolute;
      left: 50%;
      top: -72px;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
    .jcity {
      font-family: 'Comic Sans MS', 'Comic Sans', cursive;
      font-size: 3.6rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      color: #ffffff;
      text-shadow: 0 2px 0 rgba(0,0,0,1), 0 4px 20px rgba(0,0,0,0.85);
      -webkit-font-smoothing: antialiased;
    }

    /* ── ISLAND PARTS ── */
    .jtop {
      position: absolute; left: 50%; top: 28px;
      width: 248px; height: 148px;
      transform: translateX(-50%);
      clip-path: polygon(10% 24%,25% 10%,67% 6%,88% 20%,94% 48%,81% 76%,40% 91%,13% 77%,5% 48%);
      border: none;
    }
    .jrim {
      position: absolute; left: 50%; top: 155px;
      width: 268px; height: 22px;
      transform: translateX(-50%);
      clip-path: polygon(6% 24%,23% 2%,68% 0%,91% 18%,96% 54%,79% 100%,34% 100%,10% 82%,4% 52%);
      opacity: 1;
    }
    .jbot {
      position: absolute; left: 50%; top: 164px;
      width: 172px; height: 130px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #a0714f 0%, #7a5235 50%, #5c3d22 100%);
      clip-path: polygon(26% 0,77% 0,100% 19%,84% 55%,63% 100%,40% 92%,17% 58%,0 18%);
    }

    .jtree { position: absolute; width: 18px; height: 44px; opacity: 1; }
    .jtree::before {
      content: ""; position: absolute; left: 7px; bottom: 0;
      width: 5px; height: 15px; background: #6b4423; border-radius: 2px;
    }
    .jtree::after {
      content: ""; position: absolute; left: 0; top: 0;
      width: 18px; height: 28px; background: #22a855;
      clip-path: polygon(50% 0,100% 44%,76% 44%,100% 100%,0 100%,24% 44%,0 44%);
    }
    .jstone { position: absolute; width: 10px; height: 8px; background: #c8d6e0; border-radius: 4px; opacity: .6; }

    /* ── YEARS ── */
    .jyears {
      position: absolute; left: 50%; top: 314px;
      transform: translateX(-50%);
      width: 340px;
      font-family: 'Comic Sans MS', 'Comic Sans', cursive;
      font-size: 2.1rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: #ffffff;
      text-shadow: 0 2px 0 rgba(0,0,0,1), 0 4px 14px rgba(0,0,0,0.9);
      -webkit-text-stroke: 0.5px rgba(255,255,255,0.6);
      white-space: normal; pointer-events: none;
      text-align: center;
      line-height: 1.3;
      -webkit-font-smoothing: antialiased;
    }

    .jmark-spire { position: absolute; left: 50%; top: 42px; transform: translateX(-50%); width: 8px; height: 38px; }
    .jmark-spire::before {
      content: ""; position: absolute; left: 3px; bottom: 0;
      width: 2px; height: 28px; background: rgba(240,246,255,.85);
    }
    .jmark-spire::after {
      content: ""; position: absolute; left: 50%; top: 0;
      width: 10px; height: 10px; transform: translateX(-50%);
      border-radius: 999px; background: rgba(225,238,255,.92);
    }
    .jmark-arch {
      position: absolute; left: 50%; top: 58px; width: 26px; height: 20px;
      transform: translateX(-50%);
      border: 3px solid rgba(238,244,248,.68); border-bottom: none;
      border-radius: 16px 16px 0 0;
    }
    .jmark-pavilion {
      position: absolute; left: 50%; top: 54px; width: 26px; height: 16px;
      transform: translateX(-50%); background: rgba(240,244,250,.70);
      clip-path: polygon(50% 0,100% 34%,86% 34%,86% 100%,14% 100%,14% 34%,0 34%);
    }

    .jdetail {
      position: absolute;
      width: 420px; min-width: 240px; max-width: calc(100% - 20px);
      min-height: 80px; max-height: calc(100% - 20px);
      overflow: hidden;
      background: rgba(244,246,248,0.98); color: #132642;
      border: 1px solid rgba(20,40,70,.10); border-radius: 12px;
      opacity: 0; transform: translateY(18px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.26s ease, transform 0.26s ease;
      box-shadow: 0 20px 50px rgba(15,23,42,0.22);
      display: flex; flex-direction: column;
      z-index: 3;
    }
    .jdetail.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }

    .jdetail-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 0.9rem 0.9rem 0.6rem 1.1rem;
      cursor: grab; flex-shrink: 0;
      border-bottom: 1px solid rgba(20,40,70,.06);
      user-select: none;
    }
    .jdetail-header:active { cursor: grabbing; }

    .jdetail-body {
      padding: 0.75rem 1.1rem 1rem;
      overflow-y: auto;
      flex: 1;
      cursor: auto;
      user-select: text;
      -webkit-user-select: text;
    }

    .jresize { position: absolute; z-index: 5; touch-action: none; }
    .jresize-n, .jresize-s { left: 12px; right: 12px; height: 10px; }
    .jresize-n { top: -5px; cursor: n-resize; }
    .jresize-s { bottom: -5px; cursor: s-resize; }
    .jresize-e, .jresize-w { top: 12px; bottom: 12px; width: 10px; }
    .jresize-e { right: -5px; cursor: e-resize; }
    .jresize-w { left: -5px; cursor: w-resize; }
    .jresize-ne,.jresize-nw,.jresize-se,.jresize-sw { width: 16px; height: 16px; display: flex; align-items: flex-end; justify-content: flex-end; }
    .jresize-ne { top: -5px; right: -5px; cursor: ne-resize; }
    .jresize-nw { top: -5px; left: -5px; cursor: nw-resize; }
    .jresize-se { bottom: -5px; right: -5px; cursor: se-resize; padding: 4px; }
    .jresize-sw { bottom: -5px; left: -5px; cursor: sw-resize; }
    .jresize svg { opacity: 0.35; pointer-events: none; }
    .jresize:hover svg { opacity: 0.7; }

    .jdetail-actions { display: none; }

    .jdtitle {
      font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.9rem;
      color: #102744; line-height: 1;
    }
    .jdsubtitle { display: none; }

    .jcards-wrap { margin-top: 0; display: grid; gap: 0.75rem; }

    .jcard {
      background: white;
      border: 1px solid #e9edf1;
      border-radius: 10px;
      padding: 0;
      box-shadow: 0 1px 6px rgba(20,40,70,.04);
      overflow: hidden;
    }

    .jcard-head {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.95rem 1rem 0.85rem;
      border-bottom: 1px solid #eef2f6;
      background: linear-gradient(180deg, rgba(248,250,252,0.9), rgba(255,255,255,0.98));

    .jlogo {
      width: 4rem; height: 4rem; min-width: 4rem; flex-shrink: 0;
      border-radius: 999px; background: #f8fafc; border: 1px solid #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      padding: 0.45rem; box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
      overflow: hidden; color: #64748b;
    }
    .jlogo img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
    .jorg-wrap { min-width: 0; flex: 1; }
    .jorg { font-weight: 600; font-size: 0.95rem; color: #0f203a; line-height: 1.35; }
    .jroles { display: grid; gap: 0; }
    .jrole { padding: 0.9rem 1rem 0.95rem; }
    .jrole + .jrole { border-top: 1px solid #eef2f6; }
    .jct { font-weight: 600; font-size: 0.97rem; color: #0f203a; line-height: 1.35; }
    .jcy { margin-top: 0.12rem; font-size: 0.82rem; color: #7b8ca3; }
    .jcn { margin-top: 0.4rem; font-size: 0.85rem; line-height: 1.52; color: #5b6e87; white-space: pre-line; }
    .jtags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.6rem; }
    .jtag {
      border: 1px solid #dbe3ea; background: #f7f9fb; color: #7387a0;
      border-radius: 999px; padding: 0.18rem 0.45rem;
      font-size: 0.6rem; letter-spacing: .04em; text-transform: uppercase;
    }

    @media (max-width: 640px) {
      .jvp { height: 440px; }
      .jshell.is-maximized .jvp { height: calc(100vh - 1.2rem); }
      .jdetail { width: calc(100% - 20px) !important; left: 10px !important; }
      .jlogo { width: 3.3rem; height: 3.3rem; min-width: 3.3rem; }
      .jshell.is-maximized { inset: 0.6rem; border-radius: 0.9rem; }
      .jvp::after { background-size: 64px 64px; }
    }
  </style>
</head>

            org: "CAEL - Centre d'Animation Expression Loisirs de Bourg-La-Reine",
            logo: "images/logos/cael.png",
            alt: "CAEL",
            experiences: [
              { title: "French Language Training", year: "2025", note: "(French language learning, communication, integration, cultural fluency)", tags: ["French","Language","Training"] }
            ]
          },
          {
            org: "Paris, France",
            logo: "images/logos/france.png",
            alt: "Paris",
            experiences: [
              { title: "Family Settlement", year: "2026", note: "(family settlement, new life chapter, long-term grounding, transition)", tags: ["Family","Settlement","Future"] }
            ]
          }
        ]
      }
    ];

    const POSITIONS = [
      { x: -100,  y: 500  },
      { x: -100,  y: 1300 },
      { x: 400,  y: 900  },
      { x: 820,  y: 350  },
      { x: 820,  y: 1450 },
      { x: 1400, y: 900  },
      { x: 2500, y: 900  },
      { x: 1950, y: 500  },
      { x: 1950, y: 1300 },
      { x: 3100, y: 900  }
    ];

    const WW = 3600, WH = 1800;

    const shell  = document.getElementById('jshell');
    const world  = document.getElementById('jworld');
    const vp     = document.getElementById('jvp');
    const detail = document.getElementById('jdetail');
    const detailBody = document.getElementById('jdetailBody');
    const dtitle = document.getElementById('jdtitle');
    const dsub   = document.getElementById('jdsubtitle');
    const dcards = document.getElementById('jcards');
    const mapToggleBtn = document.getElementById('toggleMapSize');

    const S = { s: 1, x: 0, y: 0, ts: 1, tx: 0, ty: 0, minS: 0.28, maxS: 2.2 };
    const islands = PLACES.map((p, i) => ({ ...p, ...POSITIONS[i], el: null }));

    function markHTML(type) {
      if (type === 'spire') return '<div class="jmark-spire"></div>';
      if (type === 'arch')  return '<div class="jmark-arch"></div>';
      return '<div class="jmark-pavilion"></div>';
    }

    function yearsLabel(p) {
      if (!p.years || !p.years.length) return '';
      const lines = [];
      for (let i = 0; i < p.years.length; i += 2) {
        lines.push(p.years.slice(i, i + 2).join(', '));
      }
      return lines.join('<br>');
    }

    function buildIslands() {
      islands.forEach((p, i) => {
        const el = document.createElement('div');
        el.className = 'jisland';
        el.style.cssText = `left:${p.x}px;top:${p.y}px`;
        el.innerHTML = `
          <div class="jinner">
            <div class="jlabel"><div class="jcity">${p.city}</div></div>
            <div class="jtop" style="background:${p.top}"></div>
            <div class="jrim" style="background:${p.rim}"></div>
            <div class="jbot"></div>
            ${markHTML(p.mark)}
            <div class="jtree" style="left:114px;top:108px"></div>
            <div class="jtree" style="left:168px;top:88px;transform:scale(1.15)"></div>
            <div class="jtree" style="left:82px;top:96px;transform:scale(0.85)"></div>
            <div class="jstone" style="left:158px;top:162px"></div>
            <div class="jstone" style="left:178px;top:170px"></div>
          </div>
          <div class="jyears">${yearsLabel(p)}</div>`;
        el.addEventListener('click', e => { e.stopPropagation(); selectPlace(i); });
        world.appendChild(el);
        p.el = el;
      });
    }

    let selectedIdx = -1;
    let suppressClose = false;
    const cardState = { left: null, top: null, width: null, height: null };

    function saveCardState() {
      if (!detail.classList.contains('open')) return;
      cardState.left   = detail.style.left;
      cardState.top    = detail.style.top;
      cardState.width  = detail.style.width;
      cardState.height = detail.style.height;
    }

    function applyCardState() {
      if (cardState.left   !== null) detail.style.left   = cardState.left;
      if (cardState.top    !== null) detail.style.top    = cardState.top;
      if (cardState.width  !== null) detail.style.width  = cardState.width;
      if (cardState.height !== null) detail.style.height = cardState.height;
    }

    function selectPlace(i) {
      suppressClose = true;
      selectedIdx = i;
      const p = islands[i];
      islands.forEach((is, j) => is.el.classList.toggle('sel', j === i));
      dtitle.textContent = p.city;
      if (dsub) dsub.textContent = '';

      dcards.innerHTML = (p.groups || []).map(group => `
        <div class="jcard">
          <div class="jcard-head">
            <div class="jlogo">
              <img src="${group.logo || ''}" alt="${group.alt || group.org || p.city}"
                   onerror="this.style.display='none'; this.parentElement.innerHTML='🏛️'; this.parentElement.style.fontSize='1.25rem';">
            </div>
            <div class="jorg-wrap">
              <div class="jorg">${group.org || p.city}</div>
            </div>
          </div>
          <div class="jroles">
            ${(group.experiences || []).map(e => `
              <div class="jrole">
                <div class="jct">${e.title}</div>
                <div class="jcy">${e.year}</div>
                <div class="jcn">${e.note}</div>
                <div class="jtags">${(e.tags || []).map(t => `<span class="jtag">${t}</span>`).join('')}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');

      const wasOpen = detail.classList.contains('open');
      if (wasOpen) {
        saveCardState();
        detail.style.transition = 'none';
        applyCardState();
        requestAnimationFrame(() => { detail.style.transition = ''; });
      } else {
        detail.classList.add('open');
        if (cardState.left !== null) applyCardState();
        else positionDetail();
      }

      focusOn(p.x, p.y, 1.1);
      setTimeout(() => { suppressClose = false; }, 50);
    }

    function closeDetail() {
      if (detail.classList.contains('open')) saveCardState();
      detail.classList.remove('open');
      islands.forEach(is => is.el.classList.remove('sel'));
      selectedIdx = -1;
    }

    function focusOn(wx, wy, zoom) {
      const vw = vp.clientWidth, vh = vp.clientHeight;
      S.ts = Math.max(S.minS, Math.min(S.maxS, zoom));
      S.tx = vw * 0.5 - wx * S.ts;
      S.ty = vh * 0.5 - wy * S.ts;
    }

    function fitAll() {
      const vw = vp.clientWidth || 680;
      const vh = vp.clientHeight || 580;
      const s = Math.min(vw / WW, vh / WH) * 0.86;
      S.ts = Math.max(S.minS, Math.min(S.maxS, s));
      S.tx = (vw - WW * S.ts) * 0.5 + 70;
      S.ty = (vh - WH * S.ts) * 0.5 + 10;
    }

    function resetView() { fitAll(); closeDetail(); }

    let drag = false, moved = false, dsx = 0, dsy = 0, startTx = 0, startTy = 0;

    vp.addEventListener('pointerdown', e => {
      if (detail.contains(e.target)) return;
      drag = true; moved = false;
      vp.classList.add('dragging');
      dsx = e.clientX; dsy = e.clientY;
      startTx = S.tx; startTy = S.ty;
    });

    window.addEventListener('pointermove', e => {
      if (!drag) return;
      const dx = e.clientX - dsx, dy = e.clientY - dsy;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
      S.tx = startTx + dx; S.ty = startTy + dy;
    });

    window.addEventListener('pointerup', () => {
      drag = false;
      vp.classList.remove('dragging');
    });

    vp.addEventListener('click', e => {
      if (detail.contains(e.target)) return;
      if (suppressClose || moved) return;
      if (detail.classList.contains('open')) resetView();
    });

    detail.addEventListener('pointerdown', e => e.stopPropagation());
    detail.addEventListener('click', e => e.stopPropagation());
    detail.addEventListener('dblclick', e => e.stopPropagation());
    detail.addEventListener('wheel', e => e.stopPropagation(), { passive: true });
    detail.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
    detail.addEventListener('touchmove', e => e.stopPropagation(), { passive: true });
    detailBody.addEventListener('pointerdown', e => e.stopPropagation());
    detailBody.addEventListener('wheel', e => e.stopPropagation(), { passive: true });

    const detailHeader = document.getElementById('jdetailHeader');
    let ddrag = false, ddx = 0, ddy = 0, dStartL = 0, dStartT = 0;

    function positionDetail() {
      const vw = vp.clientWidth, vh = vp.clientHeight;
      const dw = detail.offsetWidth, dh = detail.offsetHeight;
      detail.style.left = (vw - dw - 14) + 'px';
      detail.style.top  = (vh - dh - 14) + 'px';
      detail.style.right  = 'auto';
      detail.style.bottom = 'auto';
      saveCardState();
    }

    detailHeader.addEventListener('pointerdown', e => {
      if (e.target.closest('button')) return;
      ddrag = true;
      detailHeader.setPointerCapture(e.pointerId);
      const rect = detail.getBoundingClientRect();
      const vpRect = vp.getBoundingClientRect();
      dStartL = rect.left - vpRect.left;
      dStartT = rect.top  - vpRect.top;
      ddx = e.clientX; ddy = e.clientY;
      e.stopPropagation();
    });

    detailHeader.addEventListener('pointermove', e => {
      if (!ddrag) return;
      const dx = e.clientX - ddx, dy = e.clientY - ddy;
      const vw = vp.clientWidth, vh = vp.clientHeight;
      const dw = detail.offsetWidth, dh = detail.offsetHeight;
      const newL = Math.max(0, Math.min(vw - dw, dStartL + dx));
      const newT = Math.max(0, Math.min(vh - dh, dStartT + dy));
      detail.style.left = newL + 'px';
      detail.style.top  = newT + 'px';
      saveCardState();
      e.stopPropagation();
    });

    detailHeader.addEventListener('pointerup', e => {
      ddrag = false;
      e.stopPropagation();
    });

    const resizeHandles = detail.querySelectorAll('.jresize');
    let rdrag = false, resizeDir = '', rdx = 0, rdy = 0;
    let rStartW = 0, rStartH = 0, rStartL = 0, rStartT = 0;
    const MIN_W = 240, MIN_H = 80;

    resizeHandles.forEach(handle => {
      handle.addEventListener('pointerdown', e => {
        rdrag = true;
        resizeDir = handle.dataset.dir;
        handle.setPointerCapture(e.pointerId);
        const rect = detail.getBoundingClientRect();
        const vpRect = vp.getBoundingClientRect();
        rStartW = rect.width; rStartH = rect.height;
        rStartL = rect.left - vpRect.left;
        rStartT = rect.top  - vpRect.top;
        rdx = e.clientX; rdy = e.clientY;
        e.stopPropagation();
      });

      handle.addEventListener('pointermove', e => {
        if (!rdrag) return;
        const dx = e.clientX - rdx, dy = e.clientY - rdy;
        const vw = vp.clientWidth, vh = vp.clientHeight;
        let nW = rStartW, nH = rStartH, nL = rStartL, nT = rStartT;
        if (resizeDir.includes('e')) nW = Math.max(MIN_W, Math.min(vw - nL, rStartW + dx));
        if (resizeDir.includes('s')) nH = Math.max(MIN_H, Math.min(vh - nT, rStartH + dy));
        if (resizeDir.includes('w')) {
          const pL = rStartL + dx, mL = rStartL + rStartW - MIN_W;
          nL = Math.max(0, Math.min(mL, pL));
          nW = rStartW - (nL - rStartL);
        }
        if (resizeDir.includes('n')) {
          const pT = rStartT + dy, mT = rStartT + rStartH - MIN_H;
          nT = Math.max(0, Math.min(mT, pT));
          nH = rStartH - (nT - rStartT);
        }
        if (nL + nW > vw) nW = vw - nL;
        if (nT + nH > vh) nH = vh - nT;
        detail.style.left   = nL + 'px'; detail.style.top    = nT + 'px';
        detail.style.width  = nW + 'px'; detail.style.height = nH + 'px';
        saveCardState();
        e.stopPropagation();
      });

      handle.addEventListener('pointerup', e => {
        rdrag = false; resizeDir = '';
        e.stopPropagation();
      });
    });

    function clampDetailPos() {
      const vw = vp.clientWidth, vh = vp.clientHeight;
      const dw = detail.offsetWidth, dh = detail.offsetHeight;
      const curL = parseFloat(detail.style.left) || 0;
      const curT = parseFloat(detail.style.top)  || 0;
      detail.style.left = Math.max(0, Math.min(vw - dw, curL)) + 'px';
      detail.style.top  = Math.max(0, Math.min(vh - dh, curT)) + 'px';
    }

    vp.addEventListener('wheel', e => {
      if (detail.contains(e.target)) return;
      e.preventDefault(); e.stopPropagation();
      const rect = vp.getBoundingClientRect();
      const px = e.clientX - rect.left, py = e.clientY - rect.top;
      const wx = (px - S.tx) / S.ts, wy = (py - S.ty) / S.ts;
      const factor = e.deltaY > 0 ? 0.91 : 1.1;
      const ns = Math.max(S.minS, Math.min(S.maxS, S.ts * factor));
      S.tx = px - wx * ns; S.ty = py - wy * ns; S.ts = ns;
    }, { passive: false });

    let pinchDist = 0, pinchScale = 1, pinchWC = null;
    vp.addEventListener('touchstart', e => {
      if (detail.contains(e.target)) return;
      if (e.touches.length === 2) {
        const a = e.touches[0], b = e.touches[1];
        pinchDist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
        pinchScale = S.ts;
        const rect = vp.getBoundingClientRect();
        const cx = (a.clientX + b.clientX) * 0.5 - rect.left;
        const cy = (a.clientY + b.clientY) * 0.5 - rect.top;
        pinchWC = { wx: (cx - S.tx) / S.ts, wy: (cy - S.ty) / S.ts, cx, cy };
      }
    }, { passive: false });

    vp.addEventListener('touchmove', e => {
      if (e.touches.length === 2 && pinchWC) {
        if (detail.contains(e.target)) return;
        e.preventDefault(); e.stopPropagation();
        const a = e.touches[0], b = e.touches[1];
        const d = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
        const rect = vp.getBoundingClientRect();
        const cx = (a.clientX + b.clientX) * 0.5 - rect.left;
        const cy = (a.clientY + b.clientY) * 0.5 - rect.top;
        let ns = Math.max(S.minS, Math.min(S.maxS, pinchScale * (d / pinchDist)));
        S.ts = ns; S.tx = cx - pinchWC.wx * ns; S.ty = cy - pinchWC.wy * ns;
      }
    }, { passive: false });

    vp.addEventListener('touchend', () => { pinchWC = null; });

    function tick() {
      const ease = 0.13;
      S.s += (S.ts - S.s) * ease;
      S.x += (S.tx - S.x) * ease;
      S.y += (S.ty - S.y) * ease;
      world.style.transform = `translate(${S.x}px,${S.y}px) scale(${S.s})`;
      requestAnimationFrame(tick);
    }

    let isMapMaximized = false;
    function updateMapToggleUI() {
      mapToggleBtn.textContent = isMapMaximized ? '—' : '[ ]';
      mapToggleBtn.title = isMapMaximized ? 'Minimize map' : 'Maximize map';
      mapToggleBtn.setAttribute('aria-label', isMapMaximized ? 'Minimize map' : 'Maximize map');
    }

    function applyBodyOverflowState() {
      const hoveringMap = shell.matches(':hover');
      document.body.style.overflow = (isMapMaximized || hoveringMap) ? 'hidden' : '';
    }

    function toggleMapSize() {
      const wasMaximized = isMapMaximized;
      isMapMaximized = !isMapMaximized;
      shell.classList.toggle('is-maximized', isMapMaximized);
      applyBodyOverflowState();
      updateMapToggleUI();
      requestAnimationFrame(() => requestAnimationFrame(() => {
        if (wasMaximized && !isMapMaximized) {
          resetView();
        } else if (detail.classList.contains('open') && selectedIdx !== -1) {
          const p = islands[selectedIdx];
          focusOn(p.x, p.y, 1.1);
          clampDetailPos();
        } else {
          fitAll();
        }
      }));
    }

    mapToggleBtn.addEventListener('click', e => {
      e.stopPropagation();
      toggleMapSize();
    });

    shell.addEventListener('wheel', e => { e.preventDefault(); }, { passive: false });

    vp.addEventListener('mouseenter', () => { applyBodyOverflowState(); });
    vp.addEventListener('mouseleave', () => { if (!isMapMaximized) applyBodyOverflowState(); });

    window.addEventListener('keydown', e => {
      if (e.key === 'Escape' && isMapMaximized) toggleMapSize();
    });

    buildIslands();

    function initMap() {
      fitAll();
      S.s = S.ts; S.x = S.tx; S.y = S.ty;
      updateMapToggleUI();
      tick();
    }

    requestAnimationFrame(() => requestAnimationFrame(initMap));

    window.addEventListener('resize', () => {
      if (!detail.classList.contains('open')) fitAll();
      else clampDetailPos();
    });
  }); // DOMContentLoaded
  </script>
</body>
</html>
