<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sruti — Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#06070f;
  font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
canvas{position:fixed;inset:0;display:block;width:100%!important;height:100%!important;}

/* ── Top bar ── */
#brand{position:fixed;top:22px;left:26px;pointer-events:none;z-index:10;}
#brand h1{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;
  letter-spacing:.09em;color:rgba(255,255,255,.45);}
#brand p{font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.16);margin-top:3px;}

/* ── Loading ── */
#loading{position:fixed;inset:0;background:#06070f;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
#loading p{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;
  color:rgba(255,255,255,.4);letter-spacing:.08em;}
#loading-bar-wrap{width:200px;height:1px;background:rgba(255,255,255,.08);}
#loading-bar{height:100%;background:#c8a84b;width:0%;transition:width .3s;}

/* ── Year strip ── */
#strip{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;align-items:flex-end;justify-content:center;gap:6px;
  padding:36px 14px 18px;
  background:linear-gradient(to top,rgba(6,7,15,.9) 0%,transparent 100%);
  pointer-events:all;z-index:20;overflow-x:auto;scrollbar-width:none;
}
#strip::-webkit-scrollbar{display:none;}
.yb{display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;flex-shrink:0;background:none;border:none;
  color:inherit;font-family:inherit;padding:0 3px;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1);}
.yb:hover{transform:translateY(-4px);}
.yb.active{transform:translateY(-8px);}
.yb-gem{width:9px;height:9px;border-radius:2px;transform:rotate(45deg);
  background:rgba(255,255,255,.18);transition:background .22s,box-shadow .22s;}
.yb.has-ev .yb-gem{background:rgba(255,255,255,.5);}
.yb.active .yb-gem{background:var(--ec,#c8a84b);box-shadow:0 0 10px var(--ec,#c8a84b);}
.yb-yr{font-size:8.5px;letter-spacing:.08em;font-weight:500;
  color:rgba(255,255,255,.25);transition:color .2s;white-space:nowrap;}
.yb.active .yb-yr{color:var(--ec,#c8a84b);}

/* ── Nav arrows ── */
#nav{position:fixed;top:50%;left:0;right:0;
  display:flex;justify-content:space-between;padding:0 16px;
  transform:translateY(-50%);pointer-events:all;z-index:20;
  opacity:0;transition:opacity .3s;}
#nav.show{opacity:1;}
.na{width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.45);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,color .2s;font-family:inherit;}
.na:hover{background:rgba(255,255,255,.14);color:#fff;}
.na:disabled{opacity:.2;pointer-events:none;}

/* ── Hint ── */
#hint{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);
  font-size:8px;letter-spacing:.15em;text-transform:uppercase;
  color:rgba(255,255,255,.14);pointer-events:none;z-index:15;
  white-space:nowrap;text-align:center;line-height:2;}

/* ── Panel ── */
#panel{position:fixed;right:0;top:0;bottom:0;width:min(370px,90vw);
  background:rgba(6,7,15,.97);border-left:1px solid rgba(255,255,255,.07);
  z-index:30;display:flex;flex-direction:column;
  transform:translateX(105%);will-change:transform;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
#p-bar{position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--pc,#c8a84b);opacity:.55;}
#pcl{position:absolute;top:16px;left:-42px;width:32px;height:32px;
  border-radius:50%;background:rgba(6,7,15,.92);
  border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.35);
  font-size:12px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;pointer-events:all;transition:color .2s;}
#pcl:hover{color:#fff;}
#p-head{padding:30px 24px 18px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
#p-yr{font-family:'Cormorant Garamond',serif;font-size:68px;font-weight:300;
  line-height:.9;letter-spacing:-.03em;color:var(--pc,#c8a84b);opacity:.75;}
#p-sub{font-size:8px;letter-spacing:.17em;text-transform:uppercase;
  color:rgba(255,255,255,.22);margin-top:8px;}
#p-cnt{font-size:9.5px;color:rgba(255,255,255,.17);margin-top:3px;}
#p-body{flex:1;overflow-y:auto;padding:16px 24px 24px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.07) transparent;}
#p-body::-webkit-scrollbar{width:2px;}
#p-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.09);}
.card{margin-bottom:14px;padding:14px 16px;
  border:1px solid rgba(255,255,255,.07);border-radius:11px;
  background:rgba(255,255,255,.02);transition:border-color .18s,background .18s;}
.card:hover{border-color:rgba(255,255,255,.13);background:rgba(255,255,255,.04);}
.card.milestone{border-color:rgba(200,168,75,.24);}
.card.current{border-color:rgba(74,222,128,.26);background:rgba(74,222,128,.025);}
.card.personal{border-color:rgba(244,114,182,.2);}
.cb{font-size:7.5px;letter-spacing:.13em;text-transform:uppercase;

.ct{font-family:'Cormorant Garamond',serif;font-size:15.5px;font-weight:400;
  line-height:1.32;color:rgba(255,255,255,.9);margin-bottom:4px;}
.co{font-size:11px;color:rgba(100,160,255,.72);margin-bottom:6px;}
.cn{font-size:10px;color:rgba(255,255,255,.28);line-height:1.65;}
.ctags{display:flex;flex-wrap:wrap;gap:3px;margin-top:9px;}

@media(max-width:560px){

  #p-yr{font-size:50px;}
  #strip{gap:3px;padding:28px 10px 14px;}
}
@media(prefers-reduced-motion:reduce){
  .card,#panel,.yb,#loading-bar{transition:none!important;}
}

<script>

};
const YEARS=[1994,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025,2026];
const ERA_HEX=['#c8a84b','#38e870','#38e870','#38e870','#38e870','#38e870','#38e870',
               '#38e870','#38e870','#38e870','#38e870','#38e870','#2dd4a4','#4ade80'];
const ERA_COL=[
  [0.78,0.53,0.18],[0.22,0.82,0.38],[0.22,0.82,0.38],[0.22,0.82,0.38],
  [0.22,0.82,0.38],[0.22,0.82,0.38],[0.22,0.82,0.38],[0.22,0.82,0.38],
  [0.22,0.82,0.38],[0.22,0.82,0.38],[0.22,0.82,0.38],[0.22,0.82,0.38],
  [0.18,0.80,0.60],[0.25,0.92,0.48],
];
const TYPE_META={
  milestone:{label:'★  Milestone',color:'#c8a84b'},
  education: {label:'Education',  color:'#5aadff'},
  research:  {label:'Research',   color:'#2dd4a4'},
  design:    {label:'HCI / Design',color:'#b99bff'},
  current:   {label:'⬤  Current', color:'#4ade80'},
  personal:  {label:'Personal',   color:'#f472b6'},
};

// ── CAPABILITY ───────────────────────────────────────────────────────────────
const LOW  = (navigator.hardwareConcurrency||4)<=2;
const MOB  = /Mobi|Android/i.test(navigator.userAgent);
const RED  = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
const DPR  = Math.min(devicePixelRatio||1, LOW?1:MOB?1.5:2);

// ── THREE SETUP ──────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({antialias:!LOW,alpha:false,powerPreference:'low-power'});
renderer.setPixelRatio(DPR);
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled = !LOW;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

document.body.insertBefore(renderer.domElement, document.body.firstChild);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x06070f);
scene.fog = new THREE.FogExp2(0x06070f, LOW?0.008:0.006);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 800);
camera.position.set(0, 18, 55);

// OrbitControls — built-in damping, no custom physics needed
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 8;
controls.maxDistance = 120;
controls.maxPolarAngle = Math.PI * 0.78;
controls.minPolarAngle = 0.05;
controls.target.set(0, 4, 0);
controls.autoRotate = !RED;
controls.autoRotateSpeed = 0.4;

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ── LIGHTING ─────────────────────────────────────────────────────────────────
const ambLight = new THREE.AmbientLight(0x111828, 1.4);
scene.add(ambLight);

const sunLight = new THREE.DirectionalLight(0xfff0d8, 1.2);
sunLight.position.set(60, 120, 40);
sunLight.castShadow = !LOW;
if(!LOW){
  sunLight.shadow.mapSize.set(1024,1024);
  sunLight.shadow.camera.near = 0.5;
  sunLight.shadow.camera.far  = 400;
  sunLight.shadow.camera.left = sunLight.shadow.camera.bottom = -120;
  sunLight.shadow.camera.right = sunLight.shadow.camera.top  = 120;
  sunLight.shadow.bias = -0.0005;
}
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0x1a3a6a, 0.4);
fillLight.position.set(-40, 20, -60);
scene.add(fillLight);

// ── STAR FIELD ───────────────────────────────────────────────────────────────
if(!LOW){
  const starGeo = new THREE.BufferGeometry();
  const N = MOB?600:1500;
  const pos = new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const phi = Math.acos(2*Math.random()-1);
    const th  = Math.random()*Math.PI*2;
    const r   = 350+Math.random()*50;
    pos[i*3]   = r*Math.sin(phi)*Math.cos(th);
    pos[i*3+1] = r*Math.cos(phi);
    pos[i*3+2] = r*Math.sin(phi)*Math.sin(th);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const starMat = new THREE.PointsMaterial({color:0xffffff,size:0.6,sizeAttenuation:true,transparent:true,opacity:0.7});
  scene.add(new THREE.Points(starGeo, starMat));
}

// ── PROCEDURAL ISLAND MESH ───────────────────────────────────────────────────
// Build a stylised floating island procedurally since GLTF loading has CORS constraints
// This looks great and loads instantly — Zelda Wind Waker aesthetic
function buildIslandMesh(eraColor, seed) {
  const group = new THREE.Group();
  const ec = new THREE.Color(...eraColor);

  // ── Top terrain (deformed hemisphere) ──────────────────────────────────
  const topGeo = new THREE.SphereGeometry(5.5, LOW?10:18, LOW?6:10, 0, Math.PI*2, 0, Math.PI*0.52);
  const tpa = topGeo.attributes.position.array;
  for(let i=0;i<tpa.length;i+=3){
    const x=tpa[i], y=tpa[i+1], z=tpa[i+2];
    const r=Math.sqrt(x*x+z*z);
    // Flatten + rocky noise
    tpa[i+1] = y*0.42
      + Math.sin(x*0.38+seed)*1.8
      + Math.cos(z*0.32+seed*.7)*1.4
      + Math.sin((x+z)*0.22+seed*.5)*1.0
      + Math.cos(r*0.4)*0.6;
    tpa[i]   += Math.sin(y*0.5+z*0.2+seed)*0.5;
    tpa[i+2] += Math.cos(y*0.4+x*0.2+seed)*0.5;
  }
  topGeo.computeVertexNormals();

  // Colour by height (grass top, rock sides)
  const colors = new Float32Array(tpa.length);
  const grass = new THREE.Color(0,0,0).lerpColors(
    new THREE.Color(0.08,0.18,0.06), ec.clone().multiplyScalar(0.55), 0.6);
  const rock  = new THREE.Color(0.15,0.14,0.17);
  for(let i=0;i<tpa.length/3;i++){
    const nx = topGeo.attributes.normal.array[i*3+1];
    const t  = Math.max(0, Math.min(1, (nx+0.2)*1.5));
    const col = rock.clone().lerp(grass, t);
    colors[i*3]=col.r; colors[i*3+1]=col.g; colors[i*3+2]=col.b;
  }
  topGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const topMat = new THREE.MeshLambertMaterial({vertexColors:true});
  const top = new THREE.Mesh(topGeo, topMat);
  top.castShadow = !LOW;
  top.receiveShadow = !LOW;
  group.add(top);

  // ── Underside (tapered rock) ────────────────────────────────────────────
  const botGeo = new THREE.ConeGeometry(4.8, 7, LOW?7:12, 1);
  const bpa = botGeo.attributes.position.array;
  for(let i=0;i<bpa.length;i+=3){
    bpa[i]   += Math.sin(bpa[i+1]*0.4+bpa[i+2]*0.3+seed)*1.4+Math.cos(bpa[i]*0.3)*0.8;
    bpa[i+2] += Math.cos(bpa[i+1]*0.35+bpa[i]*0.28+seed*.8)*1.2+Math.sin(bpa[i+2]*0.25)*0.7;
  }
  botGeo.computeVertexNormals();
  const botMat = new THREE.MeshLambertMaterial({color:0x111318});
  const bot = new THREE.Mesh(botGeo, botMat);
  bot.position.y = -3.8;
  bot.castShadow = !LOW;
  group.add(bot);

  // ── Glow light underneath ───────────────────────────────────────────────
  if(!LOW){
    const glight = new THREE.PointLight(ec, 1.8, 24);
    glight.position.set(0, -5, 0);
    group.add(glight);
    group.userData.glight = glight;
  }

  // ── Trees (Zelda-style stacked cones) ───────────────────────────────────
  const numTrees = LOW?2:3;
  const leafCol = ec.clone();
  leafCol.g = Math.min(1, leafCol.g*1.15);
  leafCol.multiplyScalar(0.85);
  const leafMat = new THREE.MeshLambertMaterial({color:leafCol});
  const trunkMat = new THREE.MeshLambertMaterial({color:new THREE.Color(0.22,0.14,0.07)});

  for(let t=0;t<numTrees;t++){
    const ang = seed*0.9 + t*2.2;
    const rad = 2.2 + t*1.4 + (seed%1)*1.2;
    const tx  = Math.sin(ang)*rad;
    const tz  = Math.cos(ang)*rad;
    const ty  = 0.5
      + Math.sin(tx*0.38+seed)*1.8
      + Math.cos(tz*0.32+seed*.7)*1.4;

    const treeG = new THREE.Group();
    treeG.position.set(tx, ty+1.2, tz);

    // Trunk
    const trunkGeo = new THREE.CylinderGeometry(0.12,0.18,1.6,5);
    treeG.add(new THREE.Mesh(trunkGeo, trunkMat));

    // 3 leaf tiers
    [[1.6,0.95,1.9],[2.6,0.75,1.5],[3.4,0.58,1.1]].forEach(([y2,r2,h2])=>{
      const lg = new THREE.ConeGeometry(r2, h2, 6);
      const leaf = new THREE.Mesh(lg, leafMat);
      leaf.position.y = y2;
      treeG.add(leaf);
    });
    group.add(treeG);
  }

  // ── Floating debris rocks ────────────────────────────────────────────────
  if(!LOW){
    const numRocks = 3+Math.floor((seed*7)%3);
    for(let r=0;r<numRocks;r++){
      const rg = new THREE.DodecahedronGeometry(0.3+Math.random()*0.8, 0);
      const rm = new THREE.MeshLambertMaterial({color:new THREE.Color(0.12,0.13,0.17)});
      const rock = new THREE.Mesh(rg, rm);
      const ra = Math.random()*Math.PI*2;
      const rr = 6+Math.random()*4;
      rock.position.set(Math.sin(ra)*rr, (Math.random()-0.5)*6-1, Math.cos(ra)*rr);
      rock.rotation.set(Math.random()*6,Math.random()*6,Math.random()*6);
      rock.userData.orbAngle = ra;
      rock.userData.orbRadius = rr;
      rock.userData.orbY = rock.position.y;
      rock.userData.orbSpeed = (Math.random()-0.2)*0.006;
      group.add(rock);
    }
  }

  return group;
}

// ── BUILD ALL ISLANDS ─────────────────────────────────────────────────────────
const islands = [];
const TOTAL = YEARS.length;

function islandWorldPos(i) {
  const t = i/(TOTAL-1);
  const angle = (t-0.5)*Math.PI*1.7;
  const radius = 38 + Math.sin(t*Math.PI)*12;
  return new THREE.Vector3(
    Math.sin(angle)*radius,
    Math.sin(t*Math.PI*2.1)*5 + Math.cos(i*1.8)*2.5,
    -Math.cos(angle)*radius*0.55 + 6
  );
}

YEARS.forEach((y,i)=>{
  const isl = buildIslandMesh(ERA_COL[i], i*1.73+0.5);
  const pos = islandWorldPos(i);
  isl.position.copy(pos);
  isl.userData.baseY = pos.y;
  isl.userData.year  = y;
  isl.userData.index = i;
  scene.add(isl);
  islands.push(isl);
});

// ── LIGHT BRIDGE PATHS ────────────────────────────────────────────────────────
if(!LOW){
  for(let i=0;i<islands.length-1;i++){
    const a = islands[i].position.clone().add(new THREE.Vector3(0,3,0));
    const b = islands[i+1].position.clone().add(new THREE.Vector3(0,3,0));
    const pts=[];
    for(let s=0;s<=12;s++){
      const k=s/12;
      pts.push(new THREE.Vector3().lerpVectors(a,b,k).add(
        new THREE.Vector3(0, Math.sin(k*Math.PI)*8, 0)));
    }
    const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
    const lineMat = new THREE.LineBasicMaterial({
      color:new THREE.Color(...ERA_COL[i]).lerp(new THREE.Color(...ERA_COL[i+1]),0.5),
      transparent:true, opacity:0.15
    });
    scene.add(new THREE.Line(lineGeo, lineMat));
  }
}

// ── PARTICLE EMBERS ───────────────────────────────────────────────────────────
const emberSystems = [];
if(!LOW){
  YEARS.forEach((y,i)=>{
    const N = MOB?30:80;
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(N*3);
    const vel = new Float32Array(N*3); // store velocities for animation
    const col = new Float32Array(N*3);
    const ec  = ERA_COL[i];
    const wpos = islandWorldPos(i);
    for(let j=0;j<N;j++){
      const ang = Math.random()*Math.PI*2;
      const r   = Math.random()*7+2;
      pos[j*3]   = wpos.x + Math.sin(ang)*r;
      pos[j*3+1] = wpos.y + (Math.random()-0.3)*10;
      pos[j*3+2] = wpos.z + Math.cos(ang)*r;
      vel[j*3]   = (Math.random()-0.5)*0.01;
      vel[j*3+1] = Math.random()*0.04+0.01;
      vel[j*3+2] = (Math.random()-0.5)*0.01;
      const br = 0.4+Math.random()*0.6;
      col[j*3]=ec[0]*br; col[j*3+1]=ec[1]*br; col[j*3+2]=ec[2]*br;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',    new THREE.BufferAttribute(col,3));
    const mat = new THREE.PointsMaterial({
      size:0.18, vertexColors:true,
      transparent:true, opacity:0.7,
      sizeAttenuation:true, depthWrite:false
    });
    const pts = new THREE.Points(geo, mat);
    pts.userData.vel = vel;
    pts.userData.baseY = wpos.y;
    pts.userData.rangeY = 10;
    scene.add(pts);
    emberSystems.push(pts);
  });
}

// ── RAYCASTING for click detection ───────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();
let isPointerDown = false;
let pointerMoved  = false;

renderer.domElement.addEventListener('pointerdown', e=>{
  isPointerDown=true; pointerMoved=false;
});
renderer.domElement.addEventListener('pointermove', e=>{
  if(isPointerDown) pointerMoved=true;
});
renderer.domElement.addEventListener('pointerup', e=>{
  if(!pointerMoved){
    // Click — raycast to find island
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x =  ((e.clientX-rect.left)/rect.width)*2-1;
    mouse.y = -((e.clientY-rect.top) /rect.height)*2+1;
    raycaster.setFromCamera(mouse, camera);
    // Collect all meshes in island groups
    const meshes = [];
    islands.forEach(isl=>isl.traverse(c=>{ if(c.isMesh) meshes.push(c); }));
    const hits = raycaster.intersectObjects(meshes);
    if(hits.length){
      // Find which island this mesh belongs to
      let obj = hits[0].object;
      while(obj.parent && !obj.userData.year) obj = obj.parent;
      if(obj.userData.year) selectYear(obj.userData.year);
    }
  }
  isPointerDown=false;
});

// ── YEAR STRIP ────────────────────────────────────────────────────────────────
const stripEl = document.getElementById('strip');
const ybtns   = [];
YEARS.forEach((y,i)=>{
  const b = document.createElement('button');
  b.className = 'yb'+((EVENTS[y]||[]).length?' has-ev':'');
  b.setAttribute('type','button');
  b.setAttribute('aria-label',`Year ${y}`);
  b.style.setProperty('--ec', ERA_HEX[i]);
  b.innerHTML = `<div class="yb-gem"></div><div class="yb-yr">${y}</div>`;
  b.addEventListener('click', ()=>selectYear(y));
  stripEl.appendChild(b);
  ybtns.push(b);
});

// ── STATE ─────────────────────────────────────────────────────────────────────
let selIdx = -1;
let selIsl = null;

function selectYear(y){
  const i = YEARS.indexOf(y);
  if(i<0) return;
  selIdx = i;
  selIsl = islands[i];
  controls.autoRotate = false;

  // Fly camera to island
  const target = islands[i].position.clone().add(new THREE.Vector3(0,4,0));
  const camTarget = islands[i].position.clone().add(new THREE.Vector3(0,6,28));
  gsap.to(controls.target, {x:target.x,y:target.y,z:target.z,duration:1.2,ease:'power3.inOut'});
  gsap.to(camera.position, {x:camTarget.x,y:camTarget.y,z:camTarget.z,duration:1.2,ease:'power3.inOut'});

  // Glow active island
  islands.forEach((isl,j)=>{
    const active = j===i;
    if(isl.userData.glight){
      gsap.to(isl.userData.glight, {intensity:active?4.5:1.2,duration:0.5});
    }
    // Scale up selected island slightly
    gsap.to(isl.scale,{x:active?1.1:1,y:active?1.1:1,z:active?1.1:1,duration:0.5,ease:'back.out(1.4)'});
  });

  ybtns.forEach((b,j)=>b.classList.toggle('active',j===i));
  document.getElementById('nav').classList.add('show');
  document.getElementById('pb').disabled = i===0;
  document.getElementById('nb').disabled = i===YEARS.length-1;
  openPanel(y,i);
  gsap.to('#hint',{opacity:0,duration:.3});
}

function deselect(){
  selIdx = -1; selIsl = null;
  controls.autoRotate = !RED;
  gsap.to(controls.target,{x:0,y:4,z:0,duration:1,ease:'power2.inOut'});
  gsap.to(camera.position, {x:0,y:18,z:55,duration:1,ease:'power2.inOut'});
  islands.forEach(isl=>{
    if(isl.userData.glight) gsap.to(isl.userData.glight,{intensity:1.2,duration:.4});
    gsap.to(isl.scale,{x:1,y:1,z:1,duration:.4});
  });
  document.getElementById('nav').classList.remove('show');
  ybtns.forEach(b=>b.classList.remove('active'));
  const prop = window.innerWidth>560?'x':'y';
  gsap.to('#panel',{[prop]:'105%',duration:.42,ease:'power3.in'});
  gsap.to('#hint',{opacity:1,duration:.5,delay:.4});
}

function openPanel(y,i){
  const evs = EVENTS[y]||[];
  const col = ERA_HEX[i];
  document.documentElement.style.setProperty('--pc',col);
  document.getElementById('p-bar').style.background = col;
  document.getElementById('p-yr').style.color = col;
  gsap.fromTo('#p-yr',{opacity:0,y:7},{opacity:1,y:0,duration:.36,ease:'power2.out',
    onStart:()=>{
      document.getElementById('p-yr').textContent = y;
      document.getElementById('p-sub').textContent = y===2026?'Current — Ongoing':'Selected year';
      document.getElementById('p-cnt').textContent = evs.length?`${evs.length} event${evs.length>1?'s':''}`:' ';
    }
  });
  const body = document.getElementById('p-body');
  body.innerHTML = '';
  evs.forEach((ev,j)=>{
    const card = document.createElement('article');
    card.className = `card ${ev.type}`;
    const m = TYPE_META[ev.type]||{label:ev.type,color:'#fff'};
    card.innerHTML = `
      <div class="cb" style="color:${m.color};">${m.label}</div>
      <div class="ct">${ev.title}</div>
      ${ev.org?`<div class="co">${ev.org}</div>`:''}
      ${ev.note?`<div class="cn">${ev.note}</div>`:''}
      <div class="ctags">${ev.tags.map(t=>`<span class="ctag">${t}</span>`).join('')}</div>
    `;
    body.appendChild(card);
    gsap.fromTo(card,{opacity:0,y:12},{opacity:1,y:0,duration:.34,delay:j*.07,ease:'power2.out'});
  });
  const prop = window.innerWidth>560?'x':'y';
  gsap.to('#panel',{[prop]:'0%',duration:.5,ease:'power3.out'});
}

document.getElementById('pcl').addEventListener('click',deselect);
document.getElementById('pb').addEventListener('click',()=>{if(selIdx>0)selectYear(YEARS[selIdx-1]);});
document.getElementById('nb').addEventListener('click',()=>{if(selIdx<YEARS.length-1)selectYear(YEARS[selIdx+1]);});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){deselect();return;}
  if(selIdx<0)return;
  if(e.key==='ArrowRight'&&selIdx<YEARS.length-1)selectYear(YEARS[selIdx+1]);
  if(e.key==='ArrowLeft' &&selIdx>0)              selectYear(YEARS[selIdx-1]);
});

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let frame = 0;

renderer.setAnimationLoop(()=>{
  const t = clock.getElapsedTime();
  frame++;

  // Island bobbing
  islands.forEach((isl,i)=>{
    isl.position.y = isl.userData.baseY + Math.sin(t*0.55+i*0.88)*1.8;
    // Slow world rotation
    isl.rotation.y = t*0.007*(i%2===0?1:-1);

    // Orbit debris rocks
    isl.children.forEach(ch=>{
      if(!ch.userData||ch.userData.orbSpeed===undefined) return;
      ch.userData.orbAngle += ch.userData.orbSpeed;
      ch.position.x = Math.sin(ch.userData.orbAngle)*ch.userData.orbRadius;
      ch.position.z = Math.cos(ch.userData.orbAngle)*ch.userData.orbRadius;
      ch.position.y = ch.userData.orbY + Math.sin(t*0.5+ch.userData.orbAngle)*1.5;
      ch.rotation.y += 0.005;
    });
  });

  // Ember particle drift
  emberSystems.forEach((pts,i)=>{
    const pos = pts.geometry.attributes.position.array;
    const vel = pts.userData.vel;
    const baseY = pts.userData.baseY;
    for(let j=0;j<pos.length;j+=3){
      pos[j]   += vel[j];
      pos[j+1] += vel[j+1];
      pos[j+2] += vel[j+2];
      // Reset when drifted too high
      if(pos[j+1]>baseY+pts.userData.rangeY){
        pos[j+1] = baseY - 3;
      }
    }
    pts.geometry.attributes.position.needsUpdate = true;
  });

  controls.update();
  renderer.render(scene, camera);
});

// ── HIDE LOADING ──────────────────────────────────────────────────────────────
// Procedural — no async loading needed, just wait one frame for GPU init
let loadPct = 0;
const loadInterval = setInterval(()=>{
  loadPct = Math.min(100, loadPct + 8 + Math.random()*12);
  document.getElementById('loading-bar').style.width = loadPct+'%';
  if(loadPct>=100){
    clearInterval(loadInterval);
    gsap.to('#loading',{opacity:0,duration:.6,onComplete:()=>{
      document.getElementById('loading').style.display='none';
    }});
    gsap.from('#brand',{opacity:0,y:-8,duration:1.2,ease:'power2.out'});
    gsap.from('#strip',{opacity:0,y:10,duration:1,delay:.2,ease:'power2.out'});
    gsap.from('#hint',{opacity:0,duration:1.4,delay:.5});
    setTimeout(()=>selectYear(2026), 800);
  }
},80);
</script>
